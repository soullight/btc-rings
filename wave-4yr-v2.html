<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Rings — 4-Year Wave v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0f; color:#fff;
  font-family:'SF Mono','Fira Code','Cascadia Code','Courier New',monospace;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:12px;
}
canvas { display:block; border-radius:12px; }
.hud {
  display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; justify-content:center;
  max-width:900px;
}
.hud-card {
  padding:6px 10px; border-radius:6px; text-align:center; min-width:80px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
}
.hud-card .lbl { font-size:7px; letter-spacing:2px; color:rgba(255,255,255,0.35); margin-bottom:2px; }
.hud-card .val { font-size:12px; font-weight:700; }
.title { font-size:22px; font-weight:700; letter-spacing:10px; margin-bottom:2px; }
.sub { font-size:9px; color:rgba(255,255,255,0.25); letter-spacing:3px; margin-bottom:10px; }
.loading {
  position:fixed; inset:0; background:#0a0a0f; z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.loading-text { font-size:13px; color:rgba(255,255,255,0.35); letter-spacing:3px; }
.ring {
  width:44px; height:44px; border-radius:50%; margin-top:20px;
  border:2px solid rgba(224,64,251,0.3); animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(0.8);opacity:0.3} 50%{transform:scale(1.2);opacity:0.8} }
.hide { display:none!important; }
</style>
</head>
<body>

<div id="load" class="loading">
  <div class="loading-text">MAPPING THE 4-YEAR CYCLE<span id="dots"></span></div>
  <div class="ring"></div>
</div>

<div id="app" class="hide" style="display:flex;flex-direction:column;align-items:center;">
  <div class="title">THE 4-YEAR MAP</div>
  <div class="sub">NOV 2022 — NOV 2026</div>
  <canvas id="c"></canvas>
  <div id="hud" class="hud"></div>
</div>

<script>
(function(){
'use strict';

const G='#00E676',R='#FF1744',GOLD='#FFD700',CYAN='#4FC3F7',BG='#0a0a0f',PURPLE='#E040FB';
const NOM=60;
const CYCLE_START=1669046400000; // Nov 21, 2022
const CYCLE_DAYS=1461;
const HALVING_DATE=new Date('2024-04-20');

const $=id=>document.getElementById(id);
const canvas=$('c');
const ctx=canvas.getContext('2d');

let dc=0;
const dt=setInterval(()=>{dc=(dc+1)%4;const d=$('dots');if(d)d.textContent='.'.repeat(dc);},400);

function fmt(n,d=0){
  if(!n||isNaN(n))return'—';
  return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtPct(n){return(n>=0?'+':'')+n.toFixed(1)+'%';}

async function api(url){
  const c=new AbortController();const t=setTimeout(()=>c.abort(),20000);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);if(!r.ok)throw new Error(r.status);return r.json();}
  catch(e){clearTimeout(t);throw e;}
}

/* ── TROUGH DETECTION ── */
function detectTroughs(closes,hw){
  const t=[];
  for(let i=hw;i<closes.length-hw;i++){
    let ok=true;
    for(let j=1;j<=hw;j++){if(closes[i]>closes[i-j]||closes[i]>closes[i+j]){ok=false;break;}}
    if(ok)t.push(i);
  }
  return t;
}
function filterTroughs(raw,closes,minGap){
  if(!raw.length)return raw;
  const f=[raw[0]];
  for(let i=1;i<raw.length;i++){
    if(raw[i]-f[f.length-1]>=minGap)f.push(raw[i]);
    else if(closes[raw[i]]<closes[f[f.length-1]])f[f.length-1]=raw[i];
  }
  return f;
}

/* ── DATA ── */
async function fetchAllDaily(){
  const all=[];let startTime=CYCLE_START;const now=Date.now();
  while(startTime<now){
    const url=`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&startTime=${startTime}&limit=1000`;
    const batch=await api(url);if(!batch.length)break;
    for(const k of batch)all.push({t:+k[0],h:+k[2],l:+k[3],c:+k[4]});
    startTime=+batch[batch.length-1][0]+86400000;
    if(batch.length<1000)break;
  }
  return all;
}

async function fetch4h(startTime,endTime){
  let url=`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=4h&startTime=${startTime}&limit=1000`;
  if(endTime)url+=`&endTime=${endTime}`;
  const d=await api(url);
  return d.map(k=>({t:+k[0],h:+k[2],l:+k[3],c:+k[4]}));
}

async function fetchATH(){
  try{
    const d=await api('https://api.coingecko.com/api/v3/coins/bitcoin?localization=false&tickers=false&community_data=false&developer_data=false');
    return d.market_data.ath.usd;
  }catch(e){return null;}
}

/* ── BUILD ── */
let segments=[];
let globalHi=0,globalLo=Infinity;
let livePrice=0,totalDaysElapsed=0;
let ath=0,athDay=0;
let bloodLo=0,bloodHi=0; // projected bottom range (20-30% of ATH)
let goldenLo=0,goldenHi=0; // projected next cycle top (200-350% of ATH = new ATH territory)
let remainingCycles=0;

async function buildSegments(){
  const [daily,athVal]=await Promise.all([fetchAllDaily(),fetchATH()]);
  const closes=daily.map(k=>k.c);
  const highs=daily.map(k=>k.h);
  const lows=daily.map(k=>k.l);
  const n=daily.length;

  ath=athVal||Math.max(...highs);
  if(Math.max(...highs)>ath)ath=Math.max(...highs);

  // Find ATH day for reference marker
  const maxH=Math.max(...highs);
  athDay=highs.indexOf(maxH);

  // Projected bottom range: 20-30% of ATH
  bloodLo=ath*0.20;
  bloodHi=ath*0.30;

  // Golden zone: next cycle's projected top (200-350% of current ATH)
  goldenLo=ath*2.0;
  goldenHi=ath*3.5;


  // Trough detection
  let troughs=detectTroughs(closes,12);
  troughs=filterTroughs(troughs,closes,30);
  if(troughs.length<2){troughs=detectTroughs(closes,8);troughs=filterTroughs(troughs,closes,36);}
  if(troughs.length&&troughs[0]>15)troughs.unshift(0);

  totalDaysElapsed=n;

  for(let i=0;i<troughs.length;i++){
    const si=troughs[i];
    const ei=(i<troughs.length-1)?troughs[i+1]:n-1;
    const isLast=i===troughs.length-1;

    const segH=highs.slice(si,ei+1);
    const segL=lows.slice(si,ei+1);
    const segC=closes.slice(si,ei+1);
    const cHi=Math.max(...segH);
    const cLo=Math.min(...segL);
    const peakIdx=segH.indexOf(cHi);
    const daysInCycle=ei-si;

    if(cHi>globalHi)globalHi=cHi;
    if(cLo<globalLo)globalLo=cLo;

    // Per-cycle phase: did this cycle build or destroy wealth?
    // Completed cycles: compare close to open. Current cycle: conservative detection.
    let declining=false;
    if(!isLast){
      declining=segC[segC.length-1]<segC[0]*0.95;
    }else{
      const drop=(cHi-segC[segC.length-1])/cHi;
      const daysPastPeak=daysInCycle-peakIdx;
      declining=(drop>=0.10)||(drop>=0.06&&daysPastPeak>=5)||(daysInCycle>=40&&drop>=0.05);
    }

    let wave=[];
    try{
      const startT=daily[si].t;
      const endT=isLast?undefined:daily[ei].t;
      const h4=await fetch4h(startT,endT);
      const msDay=864e5;
      wave=h4.map(k=>({day:si+(+k[0]-startT)/msDay,close:+k[4],high:+k[2],low:+k[3]}));
    }catch(e){
      wave=segC.map((c,j)=>({day:si+j,close:c,high:segH[j],low:segL[j]}));
    }

    segments.push({startDay:si,endDay:ei,cHi,cLo,peakDay:si+peakIdx,declining,wave,isLast,troughPrice:closes[si],days:daysInCycle});
  }

  livePrice=closes[n-1];

  // How many 60-day swings remain before projected bottom
  const daysRemaining=CYCLE_DAYS-totalDaysElapsed;
  remainingCycles=Math.max(0,Math.round(daysRemaining/NOM));
}

/* ── WEBSOCKET ── */
let ws=null,wsRetry=1000,poll=null;
function connectWS(){
  try{
    ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
    ws.onopen=()=>{wsRetry=1000;if(poll){clearInterval(poll);poll=null;}};
    ws.onmessage=e=>{try{livePrice=parseFloat(JSON.parse(e.data).p);}catch(e){}};
    ws.onclose=()=>{setTimeout(connectWS,wsRetry);wsRetry=Math.min(wsRetry*2,30000);startPoll();};
    ws.onerror=()=>ws.close();
  }catch(e){startPoll();}
}
function startPoll(){
  if(poll)return;
  poll=setInterval(async()=>{
    try{const d=await api('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');livePrice=parseFloat(d.price);}catch(e){}
  },3000);
}

/* ── CANVAS ── */
function resize(){
  const maxW=window.innerWidth-24;
  const maxH=window.innerHeight-120; // leave room for title + HUD bar
  const sz=Math.min(maxW,maxH,800);
  const dpr=window.devicePixelRatio||1;
  canvas.width=sz*dpr;canvas.height=sz*dpr;
  canvas.style.width=sz+'px';canvas.style.height=sz+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function dayToAngle(day){
  return(day/CYCLE_DAYS)*Math.PI*2-Math.PI/2;
}

function draw(){
  const w=parseInt(canvas.style.width);
  const h=parseInt(canvas.style.height);
  const cx=w/2,cy=h/2;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=BG;
  ctx.fillRect(0,0,w,h);
  if(!segments.length){requestAnimationFrame(draw);return;}

  const outerR=Math.min(cx,cy)-44;
  const innerR=outerR*0.18; // tight inner = maximum radial band for segments

  // SCALE: blood zone floor to just above ATH — keep segments readable
  const scaleMin=bloodLo*0.9;
  const scaleMax=globalHi*1.02;

  function priceToR(p){
    const t=(p-scaleMin)/(scaleMax-scaleMin||1);
    return innerR+Math.max(0,Math.min(1,t))*(outerR-innerR);
  }

  /* ── OUTER RING ── */
  ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.stroke();

  /* ── BLOOD ZONE — estimated cycle bottom range, 40% red ── */
  const rBloodLo=priceToR(bloodLo);
  const rBloodHi=priceToR(bloodHi);
  ctx.beginPath();
  ctx.arc(cx,cy,rBloodHi,0,Math.PI*2);
  ctx.arc(cx,cy,rBloodLo,0,Math.PI*2,true);
  ctx.closePath();
  ctx.fillStyle='rgba(255,23,68,0.30)';
  ctx.fill();
  // Edges
  ctx.beginPath();ctx.arc(cx,cy,rBloodLo,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,23,68,0.6)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,rBloodHi,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,23,68,0.6)';ctx.lineWidth=1.5;ctx.stroke();
  // Label
  ctx.font='bold 8px monospace';ctx.fillStyle='rgba(255,23,68,0.8)';ctx.textAlign='right';
  ctx.fillText('BLOOD ZONE '+fmt(bloodLo)+' — '+fmt(bloodHi),cx-8,cy+(rBloodLo+rBloodHi)/2+3);
  ctx.textAlign='center';

  /* ── GOLDEN ZONE — just the entry line at outer edge ── */
  ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,215,0,0.5)';ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 8px monospace';ctx.fillStyle='rgba(255,215,0,0.8)';
  ctx.fillText('GOLDEN '+fmt(goldenLo)+'+',cx,cy-outerR-10);

  /* ── YEAR MARKERS ── */
  ctx.textAlign='center';ctx.textBaseline='middle';
  const yearMarks=[
    {label:"NOV '22",day:0},{label:"MAY '23",day:182},{label:"NOV '23",day:365},
    {label:"MAY '24",day:548},{label:"NOV '24",day:730},{label:"MAY '25",day:913},
    {label:"NOV '25",day:1096},{label:"MAY '26",day:1278},{label:"NOV '26",day:1461}
  ];
  yearMarks.forEach(m=>{
    const a=dayToAngle(m.day);
    const isNov=m.label.startsWith('NOV');
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(outerR+2),cy+Math.sin(a)*(outerR+2));
    ctx.lineTo(cx+Math.cos(a)*(outerR+(isNov?14:8)),cy+Math.sin(a)*(outerR+(isNov?14:8)));
    ctx.strokeStyle=isNov?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=isNov?1.5:0.8;ctx.stroke();
    const lr=outerR+(isNov?26:20);
    ctx.font=isNov?'bold 9px monospace':'7px monospace';
    ctx.fillStyle=isNov?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)';
    ctx.fillText(m.label,cx+Math.cos(a)*lr,cy+Math.sin(a)*lr);
  });

  /* ── HALVING — the catalyst ── */
  const halvA=dayToAngle(516);
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(halvA)*(innerR-8),cy+Math.sin(halvA)*(innerR-8));
  ctx.lineTo(cx+Math.cos(halvA)*(outerR+6),cy+Math.sin(halvA)*(outerR+6));
  ctx.strokeStyle=PURPLE;ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 9px monospace';ctx.fillStyle=PURPLE;
  ctx.fillText('HALVING',cx+Math.cos(halvA)*(outerR+22),cy+Math.sin(halvA)*(outerR+22));

  /* ── PROJECTED BOTTOM — the floor of the wealth cycle ── */
  const bottomDay=Math.min(516+912,CYCLE_DAYS);
  const bA=dayToAngle(bottomDay);
  // Bold radial line
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(bA)*(innerR-8),cy+Math.sin(bA)*(innerR-8));
  ctx.lineTo(cx+Math.cos(bA)*(outerR+6),cy+Math.sin(bA)*(outerR+6));
  ctx.strokeStyle=R;ctx.lineWidth=2;ctx.stroke();
  // Label
  ctx.font='bold 9px monospace';ctx.fillStyle=R;
  ctx.fillText('EST. BOTTOM',cx+Math.cos(bA)*(outerR+22),cy+Math.sin(bA)*(outerR+22));

  /* ── ATH MARKER — the ceiling of the wealth cycle ── */
  const athAngle=dayToAngle(athDay);
  // Bold radial line
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(athAngle)*(innerR-8),cy+Math.sin(athAngle)*(innerR-8));
  ctx.lineTo(cx+Math.cos(athAngle)*(outerR+6),cy+Math.sin(athAngle)*(outerR+6));
  ctx.strokeStyle=GOLD;ctx.lineWidth=2;ctx.stroke();
  // ATH price ring
  const rATH=priceToR(ath);
  if(rATH>innerR&&rATH<=outerR){
    ctx.beginPath();ctx.arc(cx,cy,rATH,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,215,0,0.35)';ctx.lineWidth=1.5;ctx.stroke();
  }
  // Label
  ctx.font='bold 9px monospace';ctx.fillStyle=GOLD;
  const athLblR=outerR+22;
  ctx.fillText('ATH '+fmt(ath),cx+Math.cos(athAngle)*athLblR,cy+Math.sin(athAngle)*athLblR);

  /* ── 60-DAY SEGMENTS — THE MAIN EVENT ── */
  /* Each cycle colored by its own performance: green = built wealth, red = destroyed wealth */
  /* Relief rallies in the contraction show up green — that's the edge */
  segments.forEach(seg=>{
    const aStart=dayToAngle(seg.startDay);
    const aEnd=dayToAngle(seg.endDay);
    const rHi=priceToR(seg.cHi);
    const rLo=priceToR(seg.cLo);

    // Per-cycle: green if it built wealth, red if it destroyed it
    if(seg.declining){
      ctx.beginPath();
      ctx.arc(cx,cy,rHi,aStart,aEnd);
      ctx.arc(cx,cy,rLo,aEnd,aStart,true);
      ctx.closePath();
      ctx.fillStyle='rgba(255,23,68,0.45)';
      ctx.fill();
    }else{
      ctx.beginPath();
      ctx.arc(cx,cy,rHi,aStart,aEnd);
      ctx.arc(cx,cy,rLo,aEnd,aStart,true);
      ctx.closePath();
      ctx.fillStyle='rgba(0,230,118,0.45)';
      ctx.fill();
    }

    // Segment outline
    ctx.beginPath();
    ctx.arc(cx,cy,rHi,aStart,aEnd);
    ctx.arc(cx,cy,rLo,aEnd,aStart,true);
    ctx.closePath();
    ctx.strokeStyle=seg.declining?'rgba(255,23,68,0.3)':'rgba(0,230,118,0.3)';
    ctx.lineWidth=1;ctx.stroke();

    // Divider line at segment start
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(aStart)*rLo,cy+Math.sin(aStart)*rLo);
    ctx.lineTo(cx+Math.cos(aStart)*rHi,cy+Math.sin(aStart)*rHi);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.8;ctx.stroke();

    // Wave line (white, bold)
    const pts=seg.wave;
    if(pts.length>1){
      ctx.beginPath();
      pts.forEach((p,i)=>{
        const a=dayToAngle(p.day);const r=priceToR(p.close);
        if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
      });
      if(seg.isLast&&livePrice){
        const la=dayToAngle(totalDaysElapsed);const lr=priceToR(livePrice);
        ctx.lineTo(cx+Math.cos(la)*lr,cy+Math.sin(la)*lr);
      }
      ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;ctx.stroke();
    }

    // Trough dot
    const tR=priceToR(seg.troughPrice);
    ctx.beginPath();ctx.arc(cx+Math.cos(aStart)*tR,cy+Math.sin(aStart)*tR,3,0,Math.PI*2);
    ctx.fillStyle=CYAN;ctx.fill();
  });

  /* ── LIVE PRICE RADAR RING — full circle at current price level ── */
  if(livePrice){
    const liveR=priceToR(livePrice);
    // Full circle so you see current price relative to every segment, ATH, and blood zone
    ctx.beginPath();ctx.arc(cx,cy,liveR,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,230,118,0.5)';ctx.lineWidth=2;ctx.stroke();
    // Price label on the ring at 12 o'clock position
    ctx.font='bold 11px monospace';ctx.fillStyle=G;
    ctx.fillText(fmt(livePrice),cx,cy-liveR-10);
  }

  /* ── LIVE DOT (position on the clock) ── */
  if(livePrice&&segments.length){
    const nowA=dayToAngle(totalDaysElapsed);
    const nowR=priceToR(livePrice);
    const nx=cx+Math.cos(nowA)*nowR;
    const ny=cy+Math.sin(nowA)*nowR;

    // Glow
    ctx.beginPath();ctx.arc(nx,ny,14,0,Math.PI*2);
    ctx.fillStyle='rgba(0,230,118,0.2)';ctx.fill();
    // Dot
    ctx.beginPath();ctx.arc(nx,ny,5.5,0,Math.PI*2);
    ctx.fillStyle=G;ctx.shadowColor=G;ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;
  }

  /* ── FUTURE ARC (dashed, subtle) ── */
  if(totalDaysElapsed<CYCLE_DAYS){
    ctx.beginPath();
    ctx.arc(cx,cy,outerR*0.5,dayToAngle(totalDaysElapsed),dayToAngle(CYCLE_DAYS));
    ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;ctx.setLineDash([4,10]);ctx.stroke();ctx.setLineDash([]);
  }

  /* ── CENTER ── */
  ctx.textAlign='center';ctx.textBaseline='middle';
  const pct4=Math.round((totalDaysElapsed/CYCLE_DAYS)*100);

  ctx.font='bold 10px monospace';ctx.fillStyle=PURPLE;
  ctx.fillText('4-YEAR WAVE',cx,cy-20);

  ctx.font='7px monospace';ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText(segments.length+' CYCLES · NOV 22 → NOV 26',cx,cy-8);

  ctx.font='bold 28px monospace';
  ctx.fillStyle=pct4>75?R:pct4>50?GOLD:G;
  ctx.fillText(pct4+'%',cx,cy+14);

  ctx.font='7px monospace';ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillText('OF 4-YEAR CYCLE',cx,cy+30);

  // Remaining swings to deploy
  if(remainingCycles>0){
    ctx.font='bold 8px monospace';ctx.fillStyle=CYAN;
    ctx.fillText(remainingCycles+' SWINGS TO BOTTOM',cx,cy+44);
  }


  requestAnimationFrame(draw);
}

/* ── HUD BAR ── */
function updateHUD(){
  if(!segments.length)return;
  const p=livePrice;
  const last=segments[segments.length-1];
  const rising=segments.filter(s=>!s.declining).length;
  const declining=segments.filter(s=>s.declining).length;
  const phase=last.declining?'DECLINING':'RISING';
  const phaseColor=last.declining?R:G;

  $('hud').innerHTML=`
    <div class="hud-card"><div class="lbl">CYCLES</div><div class="val" style="color:${PURPLE}">${segments.length}</div></div>
    <div class="hud-card"><div class="lbl">RISING</div><div class="val" style="color:${G}">${rising}</div></div>
    <div class="hud-card"><div class="lbl">DECLINING</div><div class="val" style="color:${R}">${declining}</div></div>
    <div class="hud-card"><div class="lbl">SWINGS LEFT</div><div class="val" style="color:${CYAN}">${remainingCycles}</div></div>
    <div class="hud-card"><div class="lbl">CYCLE LOW</div><div class="val" style="color:${CYAN}">${fmt(globalLo)}</div></div>
    <div class="hud-card"><div class="lbl">CYCLE HIGH</div><div class="val" style="color:${GOLD}">${fmt(globalHi)}</div></div>
    <div class="hud-card"><div class="lbl">GOLDEN TARGET</div><div class="val" style="color:${GOLD}">${fmt(goldenLo)}+</div></div>
    <div class="hud-card"><div class="lbl">CURRENT</div><div class="val" style="color:${phaseColor}">${phase}</div></div>
  `;
}

/* ── INIT ── */
async function init(){
  try{
    await buildSegments();
    clearInterval(dt);
    $('load').classList.add('hide');
    const app=$('app');
    app.classList.remove('hide');
    app.style.display='flex';

    resize();
    draw();
    updateHUD();
    connectWS();
    window.addEventListener('resize',resize);
    setInterval(updateHUD,3000);
  }catch(e){
    console.error(e);$('dots').textContent='';
    document.querySelector('.loading-text').textContent='ERROR: '+e.message;
  }
}

init();
})();
</script>
</body>
