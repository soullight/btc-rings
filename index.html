<script>
// ═══════════════════════════════════════════════
// UNIVERSAL RINGS — THE MAP
// ═══════════════════════════════════════════════
// Four rings. One glance. Any asset.
//
// 1. CURRENT PRICE  — where we are right now
// 2. ALL-TIME HIGH  — the ceiling we came from
// 3. PROJECTED LOW  — the blood zone (buy zone)
// 4. PROJECTED HIGH — the golden zone (sell zone)
//
// BTC uses hardcoded 4-year cycle projections.
// Everything else: projections derived from that
// asset's own historical drawdown & rally patterns.
// ═══════════════════════════════════════════════

const $=id=>document.getElementById(id);
let allData = [];
let animProgress = 0;
let livePrice = 0;
let wsConnected = false;
let currentTicker = 'BTC';
let currentSource = '';
let projCache = null;
let projMeta = null; // stores descriptive text for labels

// ═══════════════════════════════════════════════
// CRYPTO DETECTION
// ═══════════════════════════════════════════════
const CRYPTO_BASES = ['BTC','ETH','SOL','BNB','XRP','ADA','DOGE','AVAX','DOT','LINK',
  'MATIC','LTC','UNI','ATOM','NEAR','APT','OP','ARB','SUI','PEPE','SHIB',
  'FIL','HBAR','ICP','VET','ALGO','FTM','SAND','MANA','AXS','AAVE','CRV',
  'MKR','SNX','COMP','SUSHI','YFI','RUNE','INJ','TIA','SEI','JUP','WIF',
  'BONK','FLOKI','ONDO','RENDER','FET','TAO','JASMY','KAS','TON'];

function isCrypto(ticker){
  const t = ticker.toUpperCase().replace(/[-_ ]/g,'');
  if(t.endsWith('USDT')||t.endsWith('BUSD')) return true;
  const clean = t.replace(/USD$/,'').replace(/USDT$/,'').replace(/BUSD$/,'');
  if(CRYPTO_BASES.includes(clean)) return true;
  if(t.endsWith('USD') && CRYPTO_BASES.includes(t.replace(/USD$/,''))) return true;
  return false;
}

function normalizeCryptoTicker(ticker){
  let t = ticker.toUpperCase().replace(/[-_ ]/g,'');
  if(t.endsWith('USDT')||t.endsWith('BUSD')) return t;
  if(t.endsWith('USD')) t = t.slice(0,-3);
  return t + 'USDT';
}

function cleanTicker(ticker){
  const t = ticker.toUpperCase().replace(/[-_ ]/g,'');
  if(isCrypto(ticker)){
    return t.replace(/USDT$/,'').replace(/BUSD$/,'').replace(/USD$/,'');
  }
  return t;
}

// ═══════════════════════════════════════════════
// API KEY MANAGEMENT
// ═══════════════════════════════════════════════
function getApiKey(){ return localStorage.getItem('td_api_key') || ''; }
function saveApiKey(key){ localStorage.setItem('td_api_key', key.trim()); updateKeyStatus(); }
function updateKeyStatus(){
  const key = getApiKey();
  const el = $('key-status');
  if(key){ el.textContent='✓ SAVED'; el.style.color='#00E676'; $('api-key-input').value=key.slice(0,8)+'••••'; }
  else { el.textContent='CRYPTO WORKS WITHOUT KEY'; el.style.color='rgba(255,255,255,0.2)'; }
}
$('api-key-input').addEventListener('blur', function(){ const v=this.value.trim(); if(v&&!v.includes('••')) saveApiKey(v); });
$('api-key-input').addEventListener('keydown', function(e){ if(e.key==='Enter') this.blur(); });
$('api-key-input').addEventListener('focus', function(){ const key=getApiKey(); if(key) this.value=key; });

// ═══════════════════════════════════════════════
// DATA FETCHING
// ═══════════════════════════════════════════════
async function apiFetch(url, timeout=20000){
  const c=new AbortController(); const t=setTimeout(()=>c.abort(),timeout);
  try{ const r=await fetch(url,{signal:c.signal}); clearTimeout(t); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }
  catch(e){ clearTimeout(t); throw e; }
}

// BTC: CoinGecko → Binance → CryptoCompare fallback (full history)
async function fetchBTCData(){
  try {
    const r=await fetch("https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=max&interval=daily");
    if(!r.ok) throw new Error(r.status);
    const j=await r.json();
    const d=j.prices.map(([ts,p])=>({date:new Date(ts),price:p}));
    if(d.length>100) return {data:d, source:"CoinGecko"};
  } catch(e){ console.warn("CoinGecko:",e); }
  return await fetchBinanceCrypto('BTCUSDT');
}

// Other crypto via Binance (paginated daily klines)
async function fetchBinanceCrypto(ticker){
  const sym = normalizeCryptoTicker(ticker);
  const all=[];
  let end = Date.now();
  for(let i=0;i<8;i++){
    try{
      const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1d&limit=1000&endTime=${end}`);
      if(!r.ok) break;
      const k=await r.json();
      if(!k.length) break;
      all.unshift(...k); end=k[0][0]-1;
    } catch(e){ break; }
  }
  if(all.length>30){
    const seen=new Set();
    const d=all.filter(k=>{if(seen.has(k[0]))return false;seen.add(k[0]);return true;})
      .map(k=>({date:new Date(k[0]),price:+k[4]})).sort((a,b)=>a.date-b.date);
    return {data:d, source:"Binance"};
  }
  return {data:[], source:"NO DATA"};
}

// Stocks/ETFs via Twelve Data (free key, full history)
async function fetchStockData(ticker){
  const key = getApiKey();
  if(!key) throw new Error('API key required for stocks — get a free one at twelvedata.com/register');
  const sym = ticker.toUpperCase();
  const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=1day&outputsize=5000&order=ASC&apikey=${key}`;
  const data = await apiFetch(url);
  if(data.status==='error'){
    if(data.message&&data.message.includes('api_key')) throw new Error('Invalid API key');
    throw new Error(data.message||'Twelve Data error');
  }
  const values = data.values;
  if(!values||!values.length) throw new Error('No data for '+sym);
  return {
    data: values.map(v=>({date:new Date(v.datetime), price:parseFloat(v.close)})),
    source: "Twelve Data"
  };
}

// Unified fetch
async function fetchData(ticker){
  const clean = cleanTicker(ticker);
  if(clean === 'BTC') return await fetchBTCData();
  if(isCrypto(ticker)) return await fetchBinanceCrypto(ticker);
  return await fetchStockData(ticker);
}

// ═══════════════════════════════════════════════
// ADAPTIVE PROJECTION ENGINE
// ═══════════════════════════════════════════════
// Analyzes an asset's own history to derive:
//   - Blood zone: based on historical drawdowns
//   - Golden zone: based on historical rallies from bottoms
// BTC gets its own hardcoded 4-year cycle projections.

function analyzeDrawdowns(data){
  // Walk through price history, find all significant drawdowns (>15% from peak)
  let runMax = 0, ddStart = 0;
  let inDD = false, ddLow = Infinity;
  const drawdowns = [];

  for(let i=0; i<data.length; i++){
    const p = data[i].price;
    if(p >= runMax){
      if(inDD && runMax > 0){
        const pct = (runMax - ddLow) / runMax;
        if(pct > 0.15) drawdowns.push(pct);
      }
      runMax = p; ddStart = i; inDD = false; ddLow = p;
    } else {
      if(p < ddLow) ddLow = p;
      const dd = (runMax - p) / runMax;
      if(dd > 0.15) inDD = true;
    }
  }
  // Capture any ongoing drawdown
  if(inDD && runMax > 0){
    const pct = (runMax - ddLow) / runMax;
    if(pct > 0.15) drawdowns.push(pct);
  }
  return drawdowns.sort((a,b)=>b-a); // deepest first
}

function analyzeRallies(data){
  // Find rally magnitudes from troughs to subsequent peaks
  let runMin = Infinity, runMax = 0, inRally = false;
  const rallies = [];

  // Simple approach: find local bottoms (>15% drops), then measure rally to next peak
  let troughs = [];
  let runHi = 0;
  for(let i=0; i<data.length; i++){
    const p = data[i].price;
    if(p > runHi) runHi = p;
    const dd = runHi > 0 ? (runHi - p)/runHi : 0;
    if(dd > 0.15){
      // In a drawdown — track trough
      if(!troughs.length || data[troughs[troughs.length-1]].price > p){
        troughs.push(i);
      }
    }
    if(dd < 0.05 && troughs.length){
      // Recovered — find rally from last trough
      const tIdx = troughs[troughs.length-1];
      const tPrice = data[tIdx].price;
      // Find peak between trough and now
      let peak = 0;
      for(let j=tIdx; j<=i; j++) if(data[j].price > peak) peak = data[j].price;
      if(peak > tPrice) rallies.push(peak / tPrice);
      troughs = [];
      runHi = p;
    }
  }
  return rallies.sort((a,b)=>b-a); // biggest first
}

function computeProjectionsBTC(ath){
  // Original hardcoded BTC 4-year cycle projections
  return {
    lowRange: {
      optimistic: ath * 0.30,   // -70% dd
      base:       ath * 0.25,   // -75% dd
      pessimistic: ath * 0.20,  // -80% dd
    },
    highRange: {
      conservative: ath * 1.5,
      base:         ath * 2.0,
      optimistic:   ath * 2.5,
    },
    ath,
    meta: {
      lowLabel: "~SEP–NOV 2026 · 70–80% DRAWDOWN",
      highLabel: "NEXT CYCLE TOP · 1.5–2.5× ATH",
      lowSub: "−75% from ATH · Buy target",
      highSub: "2× ATH · Sell target",
    }
  };
}

function computeProjectionsAdaptive(ath, data){
  const dds = analyzeDrawdowns(data);
  const rallies = analyzeRallies(data);

  // Drawdown-based low projection
  let ddPessimistic, ddBase, ddOptimistic;
  if(dds.length >= 3){
    ddPessimistic = dds[0];                           // deepest
    ddBase = dds[Math.floor(dds.length/2)];           // median
    ddOptimistic = dds[Math.min(2, dds.length-1)];    // 3rd deepest or shallower
  } else if(dds.length >= 1){
    ddPessimistic = dds[0];
    ddBase = dds[0] * 0.85;
    ddOptimistic = dds[0] * 0.70;
  } else {
    // Not enough history — use conservative defaults
    ddPessimistic = 0.40;
    ddBase = 0.30;
    ddOptimistic = 0.20;
  }

  // Ensure ordering: pessimistic is deepest, optimistic is shallowest
  const sorted = [ddPessimistic, ddBase, ddOptimistic].sort((a,b)=>b-a);
  ddPessimistic = sorted[0];
  ddBase = sorted[1];
  ddOptimistic = sorted[2];

  const lowRange = {
    pessimistic: ath * (1 - ddPessimistic),
    base:        ath * (1 - ddBase),
    optimistic:  ath * (1 - ddOptimistic),
  };

  // Rally-based high projection
  let hiCons, hiBase, hiOpt;
  if(rallies.length >= 2){
    // Use rally multipliers to project from ATH
    const medianRally = rallies[Math.floor(rallies.length/2)];
    const bigRally = rallies[0];
    // Map rally multipliers to ATH-relative projections
    // Conservative: ATH grows by half the median rally rate
    hiCons = ath * (1 + (medianRally - 1) * 0.3);
    hiBase = ath * (1 + (medianRally - 1) * 0.6);
    hiOpt  = ath * (1 + (bigRally - 1) * 0.5);
  } else {
    // Minimal history — conservative defaults
    hiCons = ath * 1.20;
    hiBase = ath * 1.40;
    hiOpt  = ath * 1.60;
  }

  // Ensure ordering
  const hSorted = [hiCons, hiBase, hiOpt].sort((a,b)=>a-b);

  // Ensure golden zone is above ATH
  const highRange = {
    conservative: Math.max(ath * 1.10, hSorted[0]),
    base:         Math.max(ath * 1.20, hSorted[1]),
    optimistic:   Math.max(ath * 1.30, hSorted[2]),
  };

  const ddPctLo = Math.round(ddOptimistic * 100);
  const ddPctHi = Math.round(ddPessimistic * 100);
  const hiMultLo = (highRange.conservative / ath).toFixed(1);
  const hiMultHi = (highRange.optimistic / ath).toFixed(1);

  return {
    lowRange, highRange, ath,
    meta: {
      lowLabel: `HISTORICAL DD: ${ddPctLo}–${ddPctHi}% · ${dds.length} CYCLES`,
      highLabel: `PROJECTED: ${hiMultLo}–${hiMultHi}× ATH`,
      lowSub: `−${Math.round(ddBase*100)}% from ATH · Buy target`,
      highSub: `${(highRange.base/ath).toFixed(1)}× ATH · Sell target`,
    }
  };
}

function computeProjections(ath, data){
  const clean = cleanTicker(currentTicker);
  if(clean === 'BTC') return computeProjectionsBTC(ath);
  return computeProjectionsAdaptive(ath, data);
}

// ═══════════════════════════════════════════════
// DUAL MOMENTUM ENGINE — 20d/60d ROC, 5-day confirm
// ═══════════════════════════════════════════════
function computeDualMomentum(data) {
  if (data.length < 61) return { signal: 0, label: "NO DATA", m20: 0, m60: 0 };
  let signal = 0, bullStreak = 0, bearStreak = 0, lastM20 = 0, lastM60 = 0;
  for (let i = 60; i < data.length; i++) {
    const price = data[i].price;
    const m20 = (price - data[i-20].price) / data[i-20].price;
    const m60 = (price - data[i-60].price) / data[i-60].price;
    if (m20 > 0 && m60 > 0) { bullStreak++; bearStreak = 0; }
    else if (m20 < 0 || m60 < 0) { bearStreak++; bullStreak = 0; }
    else { bullStreak = 0; bearStreak = 0; }
    if (bullStreak >= 5) signal = 1;
    if (bearStreak >= 5) signal = -1;
    lastM20 = m20; lastM60 = m60;
  }
  return { signal, label: signal===1?"BULL":signal===-1?"BEAR":"NEUTRAL", m20:lastM20, m60:lastM60 };
}

// ═══════════════════════════════════════════════
// DRAWING — clean, minimal, unmistakable
// ═══════════════════════════════════════════════
function fmtP(p) {
  if (p >= 1000) return p.toLocaleString("en", {maximumFractionDigits:0});
  if (p >= 1) return p.toFixed(2);
  return p.toPrecision(4);
}

function draw() {
  const canvas = $("canvas");
  const container = canvas.parentElement;
  const size = Math.min(container.clientWidth - 20, 700);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size*dpr; canvas.height = size*dpr;
  canvas.style.width = size+"px"; canvas.style.height = size+"px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const cx = size/2, cy = size/2;

  if (!allData.length || !projCache) return;

  const currentPrice = livePrice || allData[allData.length - 1].price;
  const proj = projCache;
  const meta = proj.meta;

  // Log scale
  const scaleMin = proj.lowRange.pessimistic * 0.7;
  const scaleMax = proj.highRange.optimistic * 1.15;
  const logMin = Math.log(Math.max(0.001, scaleMin));
  const logMax = Math.log(Math.max(0.002, scaleMax));
  const maxR = (size/2) * 0.90;
  const minR = 40;

  function p2r(price) {
    const t = (Math.log(Math.max(0.001,price)) - logMin) / (logMax - logMin || 1);
    return minR + Math.max(0, Math.min(1, t)) * (maxR - minR) * animProgress;
  }

  // Background
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, size, size);
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, size/2);
  bg.addColorStop(0, "rgba(15,15,30,0.5)");
  bg.addColorStop(1, "rgba(10,10,15,0)");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // ═════════════════════════════════════════════
  // RING 1: PROJECTED LOW — THE BLOOD ZONE
  // ═════════════════════════════════════════════
  const rLowOpt = p2r(proj.lowRange.optimistic);
  const rLowBase = p2r(proj.lowRange.base);
  const rLowPess = p2r(proj.lowRange.pessimistic);

  const bloodGrad = ctx.createRadialGradient(cx, cy, rLowPess*0.9, cx, cy, rLowOpt*1.1);
  bloodGrad.addColorStop(0, "rgba(255,23,68,0.0)");
  bloodGrad.addColorStop(0.2, "rgba(255,23,68,0.12)");
  bloodGrad.addColorStop(0.5, "rgba(255,23,68,0.18)");
  bloodGrad.addColorStop(0.8, "rgba(255,23,68,0.12)");
  bloodGrad.addColorStop(1, "rgba(255,23,68,0.0)");
  ctx.beginPath();
  ctx.arc(cx, cy, rLowOpt*1.08, 0, Math.PI*2);
  ctx.arc(cx, cy, Math.max(rLowPess*0.92, minR*0.5), 0, Math.PI*2, true);
  ctx.closePath();
  ctx.fillStyle = bloodGrad;
  ctx.fill();

  ctx.beginPath(); ctx.arc(cx,cy,rLowOpt,0,Math.PI*2);
  ctx.strokeStyle="#FF1744"; ctx.globalAlpha=0.5; ctx.lineWidth=1.5; ctx.stroke(); ctx.globalAlpha=1;

  ctx.beginPath(); ctx.arc(cx,cy,rLowBase,0,Math.PI*2);
  ctx.strokeStyle="#FF1744"; ctx.globalAlpha=0.8; ctx.lineWidth=2.5; ctx.stroke(); ctx.globalAlpha=1;
  ctx.beginPath(); ctx.arc(cx,cy,rLowBase,0,Math.PI*2);
  ctx.strokeStyle="#FF1744"; ctx.globalAlpha=0.12; ctx.lineWidth=18; ctx.stroke(); ctx.globalAlpha=1;

  ctx.beginPath(); ctx.arc(cx,cy,rLowPess,0,Math.PI*2);
  ctx.strokeStyle="#FF1744"; ctx.globalAlpha=0.4; ctx.lineWidth=1; ctx.stroke(); ctx.globalAlpha=1;

  ctx.textAlign = "center";
  ctx.font = "bold 12px monospace";
  ctx.fillStyle = "#FF1744"; ctx.globalAlpha = 0.9;
  ctx.fillText("BUY ZONE", cx, cy + rLowBase + 20);
  ctx.font = "10px monospace"; ctx.globalAlpha = 0.5;
  ctx.fillText(`$${fmtP(proj.lowRange.pessimistic)} — $${fmtP(proj.lowRange.optimistic)}`, cx, cy + rLowBase + 34);
  ctx.font = "9px monospace"; ctx.globalAlpha = 0.3;
  ctx.fillText(meta.lowLabel, cx, cy + rLowBase + 48);
  ctx.globalAlpha = 1;

  ctx.font = "8px monospace"; ctx.globalAlpha = 0.35; ctx.fillStyle = "#FF1744";
  const tickAngle = -Math.PI * 0.35;
  ctx.fillText(`$${fmtP(proj.lowRange.optimistic)}`, cx+rLowOpt*Math.cos(tickAngle)+8, cy+rLowOpt*Math.sin(tickAngle));
  ctx.fillText(`$${fmtP(proj.lowRange.base)}`, cx+rLowBase*Math.cos(tickAngle)+8, cy+rLowBase*Math.sin(tickAngle));
  ctx.fillText(`$${fmtP(proj.lowRange.pessimistic)}`, cx+rLowPess*Math.cos(tickAngle)+8, cy+rLowPess*Math.sin(tickAngle));
  ctx.globalAlpha = 1;

  // ═════════════════════════════════════════════
  // RING 2: ALL-TIME HIGH — THE CEILING
  // ═════════════════════════════════════════════
  const ath = proj.ath;
  const rATH = p2r(ath);

  ctx.beginPath(); ctx.arc(cx,cy,rATH,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,rATH,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,0.06)"; ctx.lineWidth=14; ctx.stroke();

  ctx.textAlign = "center";
  ctx.font = "bold 11px monospace"; ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.fillText(`ATH  $${fmtP(ath)}`, cx, cy - rATH - 8);
  ctx.font = "8px monospace"; ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fillText("ALL-TIME HIGH", cx, cy - rATH + 6);

  // ═════════════════════════════════════════════
  // RING 3: PROJECTED HIGH — THE GOLDEN ZONE
  // ═════════════════════════════════════════════
  const rHighCons = p2r(proj.highRange.conservative);
  const rHighBase = p2r(proj.highRange.base);
  const rHighOpt = p2r(proj.highRange.optimistic);

  const goldGrad = ctx.createRadialGradient(cx,cy,rHighCons*0.97, cx,cy,rHighOpt*1.03);
  goldGrad.addColorStop(0, "rgba(255,215,0,0.0)");
  goldGrad.addColorStop(0.2, "rgba(255,215,0,0.06)");
  goldGrad.addColorStop(0.5, "rgba(255,215,0,0.10)");
  goldGrad.addColorStop(0.8, "rgba(255,215,0,0.06)");
  goldGrad.addColorStop(1, "rgba(255,215,0,0.0)");
  ctx.beginPath();
  ctx.arc(cx,cy,rHighOpt*1.02,0,Math.PI*2);
  ctx.arc(cx,cy,rHighCons*0.98,0,Math.PI*2,true);
  ctx.closePath();
  ctx.fillStyle = goldGrad;
  ctx.fill();

  ctx.beginPath(); ctx.arc(cx,cy,rHighCons,0,Math.PI*2);
  ctx.strokeStyle="#FFD700"; ctx.globalAlpha=0.4; ctx.lineWidth=1.5; ctx.stroke(); ctx.globalAlpha=1;

  ctx.beginPath(); ctx.arc(cx,cy,rHighBase,0,Math.PI*2);
  ctx.strokeStyle="#FFD700"; ctx.globalAlpha=0.8; ctx.lineWidth=2.5; ctx.stroke(); ctx.globalAlpha=1;
  ctx.beginPath(); ctx.arc(cx,cy,rHighBase,0,Math.PI*2);
  ctx.strokeStyle="#FFD700"; ctx.globalAlpha=0.1; ctx.lineWidth=20; ctx.stroke(); ctx.globalAlpha=1;

  ctx.beginPath(); ctx.arc(cx,cy,rHighOpt,0,Math.PI*2);
  ctx.strokeStyle="#FFD700"; ctx.globalAlpha=0.35; ctx.lineWidth=1; ctx.stroke(); ctx.globalAlpha=1;

  ctx.textAlign = "center";
  ctx.font = "bold 12px monospace"; ctx.fillStyle = "#FFD700"; ctx.globalAlpha = 0.9;
  ctx.fillText("SELL ZONE", cx, cy - rHighBase - 18);
  ctx.font = "10px monospace"; ctx.globalAlpha = 0.5;
  ctx.fillText(`$${fmtP(proj.highRange.conservative)} — $${fmtP(proj.highRange.optimistic)}`, cx, cy - rHighBase - 32);
  ctx.font = "9px monospace"; ctx.globalAlpha = 0.3;
  ctx.fillText(meta.highLabel, cx, cy - rHighBase - 44);
  ctx.globalAlpha = 1;

  ctx.font = "8px monospace"; ctx.globalAlpha = 0.3; ctx.fillStyle = "#FFD700";
  const gTickAngle = Math.PI * 0.35;
  ctx.fillText(`$${fmtP(proj.highRange.conservative)}`, cx+rHighCons*Math.cos(gTickAngle)+8, cy+rHighCons*Math.sin(gTickAngle));
  ctx.fillText(`$${fmtP(proj.highRange.base)}`, cx+rHighBase*Math.cos(gTickAngle)+8, cy+rHighBase*Math.sin(gTickAngle));
  ctx.fillText(`$${fmtP(proj.highRange.optimistic)}`, cx+rHighOpt*Math.cos(gTickAngle)+8, cy+rHighOpt*Math.sin(gTickAngle));
  ctx.globalAlpha = 1;

  // ═════════════════════════════════════════════
  // RING 4: CURRENT PRICE — YOU ARE HERE
  // ═════════════════════════════════════════════
  const rCur = p2r(currentPrice);
  const momentum = computeDualMomentum(allData);
  const curColor = momentum.signal >= 0 ? "#00E676" : "#FF1744";

  ctx.beginPath(); ctx.arc(cx,cy,rCur,0,Math.PI*2);
  ctx.strokeStyle=curColor; ctx.lineWidth=5; ctx.stroke();

  [[16, 0.35], [32, 0.12], [50, 0.04]].forEach(([w, a]) => {
    ctx.beginPath(); ctx.arc(cx,cy,rCur,0,Math.PI*2);
    ctx.strokeStyle=curColor; ctx.globalAlpha=a; ctx.lineWidth=w; ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // "YOU ARE HERE" label
  const labelAngle = -Math.PI / 6;
  const lx = cx + rCur * Math.cos(labelAngle);
  const ly = cy + rCur * Math.sin(labelAngle);
  const labelOffX = 20, labelOffY = -8;
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx+labelOffX, ly+labelOffY);
  ctx.lineTo(lx+labelOffX+120, ly+labelOffY);
  ctx.strokeStyle=curColor; ctx.globalAlpha=0.4; ctx.lineWidth=1; ctx.stroke(); ctx.globalAlpha=1;

  ctx.textAlign = "left";
  ctx.font = "bold 18px monospace"; ctx.fillStyle = curColor;
  ctx.fillText(`$${fmtP(currentPrice)}`, lx+labelOffX+4, ly+labelOffY-10);

  ctx.font = "bold 9px monospace"; ctx.fillStyle = curColor; ctx.globalAlpha = 0.7;
  ctx.fillText("YOU ARE HERE", lx+labelOffX+4, ly+labelOffY-24);
  ctx.globalAlpha = 1;

  const momStateLabel = momentum.signal===1?"DUAL MOMENTUM: BULL":momentum.signal===-1?"DUAL MOMENTUM: BEAR":"DUAL MOMENTUM: NEUTRAL";
  ctx.font = "8px monospace"; ctx.fillStyle = curColor; ctx.globalAlpha = 0.5;
  ctx.fillText(momStateLabel, lx+labelOffX+4, ly+labelOffY+6);
  ctx.globalAlpha = 1;

  const pctFromATH = ((1 - currentPrice/ath)*100).toFixed(0);
  const pctToBase = ((proj.lowRange.base/currentPrice - 1)*100).toFixed(0);
  const multiplierToHigh = (proj.highRange.base / proj.lowRange.base).toFixed(1);
  ctx.font = "9px monospace"; ctx.fillStyle = "rgba(255,255,255,0.3)";
  ctx.fillText(`${pctFromATH}% below ATH`, lx+labelOffX+4, ly+labelOffY+20);

  // ═════════════════════════════════════════════
  // PULL LINES — visual gravity between zones
  // ═════════════════════════════════════════════
  ctx.setLineDash([4, 6]);

  const pullAngle1 = Math.PI * 0.55;
  ctx.beginPath();
  ctx.moveTo(cx+rCur*Math.cos(pullAngle1), cy+rCur*Math.sin(pullAngle1));
  ctx.lineTo(cx+rLowBase*Math.cos(pullAngle1), cy+rLowBase*Math.sin(pullAngle1));
  ctx.strokeStyle="#FF1744"; ctx.globalAlpha=0.2; ctx.lineWidth=1.5; ctx.stroke(); ctx.globalAlpha=1;

  const midR1 = (rCur + rLowBase) / 2;
  ctx.font = "8px monospace"; ctx.fillStyle = "#FF1744"; ctx.globalAlpha = 0.4;
  ctx.textAlign = "center";
  ctx.fillText(`↓ ${Math.abs(Number(pctToBase))}%`, cx+midR1*Math.cos(pullAngle1), cy+midR1*Math.sin(pullAngle1));

  const pullAngle2 = -Math.PI * 0.45;
  ctx.beginPath();
  ctx.moveTo(cx+rATH*Math.cos(pullAngle2), cy+rATH*Math.sin(pullAngle2));
  ctx.lineTo(cx+rHighBase*Math.cos(pullAngle2), cy+rHighBase*Math.sin(pullAngle2));
  ctx.strokeStyle="#FFD700"; ctx.globalAlpha=0.2; ctx.lineWidth=1.5; ctx.stroke(); ctx.globalAlpha=1;

  const pctATHtoHigh = ((proj.highRange.base/ath - 1)*100).toFixed(0);
  const midR2 = (rATH + rHighBase) / 2;
  ctx.font = "8px monospace"; ctx.fillStyle = "#FFD700"; ctx.globalAlpha = 0.4;
  ctx.textAlign = "center";
  ctx.fillText(`↑ ${pctATHtoHigh}%`, cx+midR2*Math.cos(pullAngle2), cy+midR2*Math.sin(pullAngle2));

  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // ═════════════════════════════════════════════
  // CENTER — the thesis
  // ═════════════════════════════════════════════
  ctx.textAlign = "center";
  ctx.font = "bold 11px monospace"; ctx.fillStyle = "rgba(255,255,255,0.3)";
  ctx.fillText("BUY THE BLOOD", cx, cy - 10);
  ctx.fillText("SELL THE GOLD", cx, cy + 6);
  ctx.font = "9px monospace"; ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fillText(`${multiplierToHigh}× POTENTIAL`, cx, cy + 22);

  // ═════════════════════════════════════════════
  // BOTTOM INFO CARDS
  // ═════════════════════════════════════════════
  const momIcon = momentum.signal===1?"▲ BULL":momentum.signal===-1?"▼ BEAR":"● NEUTRAL";
  const momDetail = `20d: ${(momentum.m20*100).toFixed(1)}% · 60d: ${(momentum.m60*100).toFixed(1)}%`;

  $("bottomBar").innerHTML = `
    <div class="bottom-card">
      <div class="lbl">CURRENT PRICE</div>
      <div class="val" style="color:${curColor}">$${fmtP(currentPrice)}</div>
      <div class="sub" style="color:${curColor}">${momIcon}</div>
    </div>
    <div class="bottom-card">
      <div class="lbl">DUAL MOMENTUM</div>
      <div class="val" style="color:${curColor};font-size:14px">${momDetail}</div>
      <div class="sub">20d/60d ROC · 5d confirm</div>
    </div>
    <div class="bottom-card">
      <div class="lbl">PROJECTED LOW</div>
      <div class="val" style="color:#FF1744">$${fmtP(proj.lowRange.base)}</div>
      <div class="sub">${meta.lowSub}</div>
    </div>
    <div class="bottom-card">
      <div class="lbl">PROJECTED HIGH</div>
      <div class="val" style="color:#FFD700">$${fmtP(proj.highRange.base)}</div>
      <div class="sub">${meta.highSub}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════
let animRunning = false;
function animate() {
  if (animProgress < 1) {
    animProgress += 0.02;
    if (animProgress > 1) animProgress = 1;
  }
  draw();
  if(animRunning) requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════
// LIVE PRICE — WebSocket (crypto) or Polling (stocks)
// ═══════════════════════════════════════════════
let ws = null, wsRetryDelay = 1000, pollingTimer = null;

function stopLive(){
  if(ws){ try{ws.close();}catch(e){} ws=null; }
  if(pollingTimer){ clearInterval(pollingTimer); pollingTimer=null; }
  wsConnected = false;
}

function startLive(ticker){
  stopLive();
  if(isCrypto(ticker)){
    const sym = normalizeCryptoTicker(ticker).toLowerCase();
    try{
      ws = new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@trade`);
      ws.onopen = ()=>{ wsConnected=true; wsRetryDelay=1000; $("badgeText").textContent='STREAMING · Binance WebSocket'; };
      ws.onmessage = e=>{ try{livePrice=parseFloat(JSON.parse(e.data).p);}catch(e){} };
      ws.onclose = ()=>{ wsConnected=false; setTimeout(()=>startLive(ticker),wsRetryDelay); wsRetryDelay=Math.min(wsRetryDelay*2,30000); startCryptoPoll(ticker); };
      ws.onerror = ()=>ws.close();
    } catch(e){ startCryptoPoll(ticker); }
  } else {
    startStockPoll(ticker);
  }
}

function startCryptoPoll(ticker){
  if(pollingTimer) return;
  const sym = normalizeCryptoTicker(ticker);
  pollingTimer = setInterval(async()=>{
    try{
      const d=await apiFetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`,5000);
      livePrice=parseFloat(d.price);
      $("badgeText").textContent='LIVE · Binance (polling)';
    }catch(e){}
  },3000);
}

function startStockPoll(ticker){
  if(pollingTimer) return;
  const key=getApiKey(); if(!key) return;
  const sym=ticker.toUpperCase();
  (async()=>{try{const d=await apiFetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(sym)}&apikey=${key}`,5000);if(d.price)livePrice=parseFloat(d.price);}catch(e){}})();
  pollingTimer = setInterval(async()=>{
    try{
      const d=await apiFetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(sym)}&apikey=${key}`,5000);
      if(d.price){livePrice=parseFloat(d.price); $("badgeText").textContent=`LIVE · Twelve Data`;}
    }catch(e){}
  },15000);
}

// ═══════════════════════════════════════════════
// GO — load a ticker
// ═══════════════════════════════════════════════
let running = false;

async function go(ticker){
  if(running) return;
  running = true;

  ticker = (ticker || $('ticker-input').value).trim().toUpperCase();
  if(!ticker){ $('error-msg').textContent='ENTER A TICKER'; running=false; return; }

  $('error-msg').textContent='';
  $('go-btn').disabled=true;
  $('go-btn').textContent='LOADING...';
  $('loading').style.display='block';
  $('load-ticker').textContent=ticker;
  $('app').style.display='none';

  try {
    const result = await fetchData(ticker);
    if(!result.data.length) throw new Error('No data returned');

    allData = result.data;
    currentTicker = ticker;
    currentSource = result.source;

    const ath = Math.max(...allData.map(d=>d.price));
    projCache = computeProjections(ath, allData);

    const display = cleanTicker(ticker);
    $('title').textContent = display + ' RINGS';
    $('subtitle').textContent = 'THE MAP · WHERE WE ARE · WHERE WE\'RE GOING';
    $('footer').textContent = `LIVE · ${result.source} · ${allData.length} DAYS · LOG SCALE`;

    livePrice = allData[allData.length-1].price;
    animProgress = 0;
    animRunning = true;

    $('loading').style.display='none';
    $('app').style.display='flex';
    $('badgeText').textContent = `LIVE · ${result.source} · connecting...`;

    animate();
    startLive(ticker);

  } catch(e){
    $('loading').style.display='none';
    let msg = e.message || 'Unknown error';
    if(!isCrypto(ticker) && !getApiKey()){
      msg = 'STOCKS NEED AN API KEY — get one free at twelvedata.com/register';
    }
    $('error-msg').textContent = msg;
  }

  $('go-btn').disabled=false;
  $('go-btn').textContent='MAP IT';
  running=false;
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
let dotCount = 0;
setInterval(()=>{
  dotCount=(dotCount+1)%4;
  const el=$("dots"); if(el) el.textContent=".".repeat(dotCount);
},400);

$('go-btn').addEventListener('click', ()=>go());
$('ticker-input').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
window.addEventListener("resize", ()=>{ if(animProgress>=1 && allData.length) draw(); });
updateKeyStatus();

// Auto-load BTC on start
go('BTC');
</script>
