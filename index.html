<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Rings — Clear</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f; color: #fff;
    font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New', monospace;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: 8px; color: rgba(255,255,255,0.9); }
  .subtitle { font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 3px; margin-top: 6px; }
  canvas { border-radius: 12px; margin-top: 16px; }
  .loading { text-align: center; padding: 100px 0; }
  .loading-text { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
  .pulse-ring {
    width: 60px; height: 60px; border-radius: 50%; margin: 30px auto 0;
    border: 2px solid rgba(0,230,118,0.3); animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(0.8);opacity:0.3} 50%{transform:scale(1.2);opacity:0.8} }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 14px; border-radius: 20px; font-size: 10px; margin: 10px 0;
    background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2);
  }
  .dot { width:6px; height:6px; border-radius:50%; display:inline-block; background:#00E676; box-shadow:0 0 6px #00E676; }
  .bottom-bar {
    margin-top: 16px; max-width: 700px; width: 100%;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  }
  .bottom-card {
    padding: 12px 14px; border-radius: 8px;
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }
  .bottom-card .lbl { font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-bottom: 6px; }
  .bottom-card .val { font-size: 16px; font-weight: 700; }
  .bottom-card .sub { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 4px; }
  .footer { margin-top: 14px; font-size: 9px; color: rgba(255,255,255,0.12); letter-spacing: 1px; text-align:center; }
  @media (max-width: 600px) {
    .bottom-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div style="text-align:center;">
  <h1>BITCOIN RINGS</h1>
  <div class="subtitle">THE MAP · WHERE WE ARE · WHERE WE'RE GOING</div>
</div>

<div id="loading" class="loading">
  <div class="loading-text">LOADING<span id="dots"></span></div>
  <div class="pulse-ring"></div>
</div>

<div id="app" style="display:none; flex-direction:column; align-items:center; width:100%;">
  <div id="badge" class="badge"><span class="dot"></span><span id="badgeText">LIVE</span></div>
  <canvas id="canvas"></canvas>
  <div id="bottomBar" class="bottom-bar"></div>
  <div class="footer">LIVE DATA · UPDATED ON LOAD · LOG SCALE RADIUS</div>
</div>

<script>
// ═══════════════════════════════════════════════
// THE ONLY THINGS THAT MATTER
// ═══════════════════════════════════════════════
//
// 1. CURRENT PRICE  — where we are right now
// 2. ALL-TIME HIGH  — the ceiling we came from
// 3. PROJECTED LOW  — the blood zone (next cycle bottom, ~Sep-Nov)
// 4. PROJECTED HIGH — the golden zone (next cycle top target)
//
// That's it. Four rings. One glance.
// ═══════════════════════════════════════════════

const C4_BOTTOM = 15800;
let allData = [];
let animProgress = 0;

// ═══════════════════════════════════════════════
// PROJECTIONS — derived from cycle analysis
// ═══════════════════════════════════════════════
function computeProjections(ath) {
  // ── PROJECTED CYCLE LOW (Blood Zone) ──
  // Historical drawdowns from ATH: -84.7% (C1), -83.8% (C2), -77.0% (C3)
  // Trend: diminishing ~3-7% per cycle
  // Conservative range: -70% to -80% from ATH
  // Timeline: ~Sep-Nov 2026 based on 4-year cycle rhythm
  const lowRange = {
    optimistic: ath * 0.30,  // -70% dd
    base:       ath * 0.25,  // -75% dd (most likely)
    pessimistic: ath * 0.20, // -80% dd
  };

  // ── PROJECTED CYCLE HIGH (Golden Zone) ──
  // This is the Cycle 5 top — IF we get another bull run
  // Historical top multipliers from bottom: 119x, 22x, 19.6x, ~9.5x (diminishing)
  // Next cycle: ~4-6x from projected bottom
  // Bottom-based: $25K base × 5 = $125K (recovery to prior ATH area)
  // Optimistic: new highs — $200K-$300K range
  // Conservative model: ATH × 1.5 to ATH × 2.5
  const highRange = {
    conservative: ath * 1.5,   // just 50% above current ATH
    base:         ath * 2.0,   // 2x ATH — solid bull
    optimistic:   ath * 2.5,   // 2.5x ATH — full mania
  };

  return { lowRange, highRange, ath };
}

// ═══════════════════════════════════════════════
// DATA FETCHING
// ═══════════════════════════════════════════════
async function fetchBTCData() {
  try {
    const r = await fetch("https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=max&interval=daily");
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    const d = j.prices.map(([ts,p]) => ({date:new Date(ts),price:p}));
    if (d.length > 100) return {data:d, source:"CoinGecko"};
  } catch(e) { console.warn("CoinGecko:",e); }
  try {
    const all = [];
    let end = Date.now();
    for (let i=0;i<8;i++) {
      const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=1000&endTime=${end}`);
      if (!r.ok) break;
      const k = await r.json();
      if (!k.length) break;
      all.unshift(...k); end = k[0][0]-1;
    }
    if (all.length>100) {
      const seen=new Set();
      const d=all.filter(k=>{if(seen.has(k[0]))return false;seen.add(k[0]);return true;})
        .map(k=>({date:new Date(k[0]),price:+k[4]})).sort((a,b)=>a.date-b.date);
      return {data:d, source:"Binance"};
    }
  } catch(e) { console.warn("Binance:",e); }
  try {
    const all=[];
    let toTs=Math.floor(Date.now()/1000);
    for(let i=0;i<3;i++){
      const r=await fetch(`https://min-api.cryptocompare.com/data/v2/histoday?fsym=BTC&tsym=USD&limit=2000&toTs=${toTs}`);
      if(!r.ok)break;
      const j=await r.json();
      if(!j.Data?.Data?.length)break;
      all.unshift(...j.Data.Data); toTs=j.Data.Data[0].time-1;
    }
    if(all.length>100){
      const seen=new Set();
      const d=all.filter(x=>{if(seen.has(x.time))return false;seen.add(x.time);return true;})
        .map(x=>({date:new Date(x.time*1000),price:x.close}))
        .filter(x=>x.price>0).sort((a,b)=>a.date-b.date);
      return {data:d, source:"CryptoCompare"};
    }
  } catch(e) { console.warn("CryptoCompare:",e); }
  return {data:[], source:"ERROR"};
}

// ═══════════════════════════════════════════════
// DUAL MOMENTUM ENGINE — 20d/60d ROC, 5-day confirm
// ═══════════════════════════════════════════════
// Rules:
//   m20 = (price - price_20d_ago) / price_20d_ago
//   m60 = (price - price_60d_ago) / price_60d_ago
//   Both positive for 5 consecutive days → BULL (green)
//   Either negative for 5 consecutive days → BEAR (red)
//   Signal carries forward between confirmations
// ═══════════════════════════════════════════════
function computeDualMomentum(data) {
  if (data.length < 61) return { signal: 0, label: "NO DATA", m20: 0, m60: 0, bullDays: 0, bearDays: 0 };

  let signal = 0; // 0 = no signal yet, 1 = bull, -1 = bear
  let bullStreak = 0, bearStreak = 0;
  let lastM20 = 0, lastM60 = 0;

  for (let i = 60; i < data.length; i++) {
    const price = data[i].price;
    const p20 = data[i - 20].price;
    const p60 = data[i - 60].price;
    const m20 = (price - p20) / p20;
    const m60 = (price - p60) / p60;

    const bothPositive = m20 > 0 && m60 > 0;
    const eitherNegative = m20 < 0 || m60 < 0;

    if (bothPositive) {
      bullStreak++;
      bearStreak = 0;
    } else if (eitherNegative) {
      bearStreak++;
      bullStreak = 0;
    } else {
      bullStreak = 0;
      bearStreak = 0;
    }

    if (bullStreak >= 5) signal = 1;
    if (bearStreak >= 5) signal = -1;

    lastM20 = m20;
    lastM60 = m60;
  }

  const label = signal === 1 ? "BULL" : signal === -1 ? "BEAR" : "NEUTRAL";
  return { signal, label, m20: lastM20, m60: lastM60, bullDays: bullStreak, bearDays: bearStreak };
}

// ═══════════════════════════════════════════════
// DRAWING — clean, minimal, unmistakable
// ═══════════════════════════════════════════════
function fmtP(p) {
  if (p >= 1000) return p.toLocaleString("en", {maximumFractionDigits:0});
  return p.toFixed(2);
}

function draw() {
  const canvas = document.getElementById("canvas");
  const container = canvas.parentElement;
  const size = Math.min(container.clientWidth - 20, 700);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size*dpr; canvas.height = size*dpr;
  canvas.style.width = size+"px"; canvas.style.height = size+"px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const cx = size/2, cy = size/2;

  if (!allData.length) return;

  // Get current price and ATH
  const currentPrice = allData[allData.length - 1].price;
  const ath = Math.max(...allData.map(d => d.price));
  const proj = computeProjections(ath);

  // ── SCALE ──
  // Log scale from pessimistic low to optimistic high
  // Everything maps into this range
  const scaleMin = proj.lowRange.pessimistic * 0.7;
  const scaleMax = proj.highRange.optimistic * 1.15;
  const logMin = Math.log(scaleMin);
  const logMax = Math.log(scaleMax);
  const maxR = (size/2) * 0.90;
  const minR = 40;

  function p2r(price) {
    const t = (Math.log(price) - logMin) / (logMax - logMin);
    const clamped = Math.max(0, Math.min(1, t));
    return minR + clamped * (maxR - minR) * animProgress;
  }

  // ── BACKGROUND ──
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, size, size);
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, size/2);
  bg.addColorStop(0, "rgba(15,15,30,0.5)");
  bg.addColorStop(1, "rgba(10,10,15,0)");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // ═════════════════════════════════════════════
  // RING 1: PROJECTED LOW — THE BLOOD ZONE
  // Inner ring cluster. Red. Where we want to BUY.
  // ═════════════════════════════════════════════
  const rLowOpt = p2r(proj.lowRange.optimistic);    // -70%
  const rLowBase = p2r(proj.lowRange.base);          // -75%
  const rLowPess = p2r(proj.lowRange.pessimistic);   // -80%

  // Blood zone fill (between optimistic and pessimistic)
  const bloodGrad = ctx.createRadialGradient(cx, cy, rLowPess * 0.9, cx, cy, rLowOpt * 1.1);
  bloodGrad.addColorStop(0, "rgba(255,23,68,0.0)");
  bloodGrad.addColorStop(0.2, "rgba(255,23,68,0.12)");
  bloodGrad.addColorStop(0.5, "rgba(255,23,68,0.18)");
  bloodGrad.addColorStop(0.8, "rgba(255,23,68,0.12)");
  bloodGrad.addColorStop(1, "rgba(255,23,68,0.0)");
  ctx.beginPath();
  ctx.arc(cx, cy, rLowOpt * 1.08, 0, Math.PI*2);
  ctx.arc(cx, cy, Math.max(rLowPess * 0.92, minR * 0.5), 0, Math.PI*2, true);
  ctx.closePath();
  ctx.fillStyle = bloodGrad;
  ctx.fill();

  // Outer edge of blood zone (-70%)
  ctx.beginPath(); ctx.arc(cx, cy, rLowOpt, 0, Math.PI*2);
  ctx.strokeStyle = "#FF1744"; ctx.globalAlpha = 0.5; ctx.lineWidth = 1.5;
  ctx.stroke(); ctx.globalAlpha = 1;

  // Base line (-75%) — the most likely bottom
  ctx.beginPath(); ctx.arc(cx, cy, rLowBase, 0, Math.PI*2);
  ctx.strokeStyle = "#FF1744"; ctx.globalAlpha = 0.8; ctx.lineWidth = 2.5;
  ctx.stroke(); ctx.globalAlpha = 1;
  // Glow on base
  ctx.beginPath(); ctx.arc(cx, cy, rLowBase, 0, Math.PI*2);
  ctx.strokeStyle = "#FF1744"; ctx.globalAlpha = 0.12; ctx.lineWidth = 18;
  ctx.stroke(); ctx.globalAlpha = 1;

  // Inner edge (-80%)
  ctx.beginPath(); ctx.arc(cx, cy, rLowPess, 0, Math.PI*2);
  ctx.strokeStyle = "#FF1744"; ctx.globalAlpha = 0.4; ctx.lineWidth = 1;
  ctx.stroke(); ctx.globalAlpha = 1;

  // Blood zone labels
  ctx.textAlign = "center";
  ctx.font = "bold 12px monospace";
  ctx.fillStyle = "#FF1744"; ctx.globalAlpha = 0.9;
  ctx.fillText("BUY ZONE", cx, cy + rLowBase + 20);
  ctx.font = "10px monospace"; ctx.globalAlpha = 0.5;
  ctx.fillText(`$${fmtP(proj.lowRange.pessimistic)} — $${fmtP(proj.lowRange.optimistic)}`, cx, cy + rLowBase + 34);
  ctx.font = "9px monospace"; ctx.globalAlpha = 0.3;
  ctx.fillText("~SEP–NOV 2026 · 70–80% DRAWDOWN", cx, cy + rLowBase + 48);
  ctx.globalAlpha = 1;

  // Price ticks inside the zone
  ctx.font = "8px monospace"; ctx.globalAlpha = 0.35;
  ctx.fillStyle = "#FF1744";
  const tickAngle = -Math.PI * 0.35;
  ctx.fillText(`$${fmtP(proj.lowRange.optimistic)}`, cx + rLowOpt * Math.cos(tickAngle) + 8, cy + rLowOpt * Math.sin(tickAngle));
  ctx.fillText(`$${fmtP(proj.lowRange.base)}`, cx + rLowBase * Math.cos(tickAngle) + 8, cy + rLowBase * Math.sin(tickAngle));
  ctx.fillText(`$${fmtP(proj.lowRange.pessimistic)}`, cx + rLowPess * Math.cos(tickAngle) + 8, cy + rLowPess * Math.sin(tickAngle));
  ctx.globalAlpha = 1;

  // ═════════════════════════════════════════════
  // RING 2: ALL-TIME HIGH — THE CEILING
  // White/silver. Reference point. Where we came from.
  // ═════════════════════════════════════════════
  const rATH = p2r(ath);

  ctx.beginPath(); ctx.arc(cx, cy, rATH, 0, Math.PI*2);
  ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 2;
  ctx.stroke();
  // Subtle glow
  ctx.beginPath(); ctx.arc(cx, cy, rATH, 0, Math.PI*2);
  ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.lineWidth = 14;
  ctx.stroke();

  // ATH label
  ctx.textAlign = "center";
  ctx.font = "bold 11px monospace"; ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.fillText(`ATH  $${fmtP(ath)}`, cx, cy - rATH - 8);
  ctx.font = "8px monospace"; ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fillText("CURRENT CYCLE HIGH", cx, cy - rATH + 6);

  // ═════════════════════════════════════════════
  // RING 3: PROJECTED HIGH — THE GOLDEN ZONE
  // Gold. Where we're going (next cycle top).
  // ═════════════════════════════════════════════
  const rHighCons = p2r(proj.highRange.conservative);
  const rHighBase = p2r(proj.highRange.base);
  const rHighOpt = p2r(proj.highRange.optimistic);

  // Golden zone fill
  const goldGrad = ctx.createRadialGradient(cx, cy, rHighCons * 0.97, cx, cy, rHighOpt * 1.03);
  goldGrad.addColorStop(0, "rgba(255,215,0,0.0)");
  goldGrad.addColorStop(0.2, "rgba(255,215,0,0.06)");
  goldGrad.addColorStop(0.5, "rgba(255,215,0,0.10)");
  goldGrad.addColorStop(0.8, "rgba(255,215,0,0.06)");
  goldGrad.addColorStop(1, "rgba(255,215,0,0.0)");
  ctx.beginPath();
  ctx.arc(cx, cy, rHighOpt * 1.02, 0, Math.PI*2);
  ctx.arc(cx, cy, rHighCons * 0.98, 0, Math.PI*2, true);
  ctx.closePath();
  ctx.fillStyle = goldGrad;
  ctx.fill();

  // Conservative edge
  ctx.beginPath(); ctx.arc(cx, cy, rHighCons, 0, Math.PI*2);
  ctx.strokeStyle = "#FFD700"; ctx.globalAlpha = 0.4; ctx.lineWidth = 1.5;
  ctx.stroke(); ctx.globalAlpha = 1;

  // Base line — most likely top
  ctx.beginPath(); ctx.arc(cx, cy, rHighBase, 0, Math.PI*2);
  ctx.strokeStyle = "#FFD700"; ctx.globalAlpha = 0.8; ctx.lineWidth = 2.5;
  ctx.stroke(); ctx.globalAlpha = 1;
  // Glow
  ctx.beginPath(); ctx.arc(cx, cy, rHighBase, 0, Math.PI*2);
  ctx.strokeStyle = "#FFD700"; ctx.globalAlpha = 0.1; ctx.lineWidth = 20;
  ctx.stroke(); ctx.globalAlpha = 1;

  // Optimistic edge
  ctx.beginPath(); ctx.arc(cx, cy, rHighOpt, 0, Math.PI*2);
  ctx.strokeStyle = "#FFD700"; ctx.globalAlpha = 0.35; ctx.lineWidth = 1;
  ctx.stroke(); ctx.globalAlpha = 1;

  // Golden zone labels
  ctx.textAlign = "center";
  ctx.font = "bold 12px monospace"; ctx.fillStyle = "#FFD700"; ctx.globalAlpha = 0.9;
  ctx.fillText("SELL ZONE", cx, cy - rHighBase - 18);
  ctx.font = "10px monospace"; ctx.globalAlpha = 0.5;
  ctx.fillText(`$${fmtP(proj.highRange.conservative)} — $${fmtP(proj.highRange.optimistic)}`, cx, cy - rHighBase - 32);
  ctx.font = "9px monospace"; ctx.globalAlpha = 0.3;
  ctx.fillText("NEXT CYCLE TOP · 1.5–2.5× ATH", cx, cy - rHighBase - 44);
  ctx.globalAlpha = 1;

  // Price ticks
  ctx.font = "8px monospace"; ctx.globalAlpha = 0.3;
  ctx.fillStyle = "#FFD700";
  const gTickAngle = Math.PI * 0.35;
  ctx.fillText(`$${fmtP(proj.highRange.conservative)}`, cx + rHighCons * Math.cos(gTickAngle) + 8, cy + rHighCons * Math.sin(gTickAngle));
  ctx.fillText(`$${fmtP(proj.highRange.base)}`, cx + rHighBase * Math.cos(gTickAngle) + 8, cy + rHighBase * Math.sin(gTickAngle));
  ctx.fillText(`$${fmtP(proj.highRange.optimistic)}`, cx + rHighOpt * Math.cos(gTickAngle) + 8, cy + rHighOpt * Math.sin(gTickAngle));
  ctx.globalAlpha = 1;

  // ═════════════════════════════════════════════
  // RING 4: CURRENT PRICE — YOU ARE HERE
  // Bold. Glowing. The one that matters most.
  // ═════════════════════════════════════════════
  const rCur = p2r(currentPrice);

  // Dual momentum: 20d/60d ROC with 5-day confirmation
  const momentum = computeDualMomentum(allData);
  const curColor = momentum.signal >= 0 ? "#00E676" : "#FF1744"; // green if bull or neutral, red if confirmed bear

  // The ring itself — bold and unmistakable
  ctx.beginPath(); ctx.arc(cx, cy, rCur, 0, Math.PI*2);
  ctx.strokeStyle = curColor; ctx.lineWidth = 5; ctx.stroke();

  // Bright glow layers
  [[16, 0.35], [32, 0.12], [50, 0.04]].forEach(([w, a]) => {
    ctx.beginPath(); ctx.arc(cx, cy, rCur, 0, Math.PI*2);
    ctx.strokeStyle = curColor; ctx.globalAlpha = a; ctx.lineWidth = w; ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // "YOU ARE HERE" label
  const labelAngle = -Math.PI / 6;
  const lx = cx + rCur * Math.cos(labelAngle);
  const ly = cy + rCur * Math.sin(labelAngle);

  // Connector line from ring to label
  const labelOffX = 20, labelOffY = -8;
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx + labelOffX, ly + labelOffY);
  ctx.lineTo(lx + labelOffX + 120, ly + labelOffY);
  ctx.strokeStyle = curColor; ctx.globalAlpha = 0.4; ctx.lineWidth = 1;
  ctx.stroke(); ctx.globalAlpha = 1;

  ctx.textAlign = "left";
  ctx.font = "bold 18px monospace"; ctx.fillStyle = curColor;
  ctx.fillText(`$${fmtP(currentPrice)}`, lx + labelOffX + 4, ly + labelOffY - 10);

  ctx.font = "bold 9px monospace"; ctx.fillStyle = curColor; ctx.globalAlpha = 0.7;
  ctx.fillText("YOU ARE HERE", lx + labelOffX + 4, ly + labelOffY - 24);
  ctx.globalAlpha = 1;

  // Momentum state label on the ring
  const momStateLabel = momentum.signal === 1 ? "DUAL MOMENTUM: BULL" : momentum.signal === -1 ? "DUAL MOMENTUM: BEAR" : "DUAL MOMENTUM: NEUTRAL";
  ctx.font = "8px monospace"; ctx.fillStyle = curColor; ctx.globalAlpha = 0.5;
  ctx.fillText(momStateLabel, lx + labelOffX + 4, ly + labelOffY + 6);
  ctx.globalAlpha = 1;

  // Distance annotations
  ctx.font = "9px monospace"; ctx.fillStyle = "rgba(255,255,255,0.3)";
  const pctFromATH = ((1 - currentPrice / ath) * 100).toFixed(0);
  const pctToBase = ((proj.lowRange.base / currentPrice - 1) * 100).toFixed(0);
  const multiplierToHigh = (proj.highRange.base / proj.lowRange.base).toFixed(1);
  ctx.fillText(`${pctFromATH}% below ATH`, lx + labelOffX + 4, ly + labelOffY + 20);
  ctx.textAlign = "left";

  // ═════════════════════════════════════════════
  // PULL LINES — visual gravity between zones
  // ═════════════════════════════════════════════

  // Dashed line from current to blood zone
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  const pullAngle1 = Math.PI * 0.55;
  ctx.moveTo(cx + rCur * Math.cos(pullAngle1), cy + rCur * Math.sin(pullAngle1));
  ctx.lineTo(cx + rLowBase * Math.cos(pullAngle1), cy + rLowBase * Math.sin(pullAngle1));
  ctx.strokeStyle = "#FF1744"; ctx.globalAlpha = 0.2; ctx.lineWidth = 1.5;
  ctx.stroke(); ctx.globalAlpha = 1;

  // Arrow label on pull line
  const midR1 = (rCur + rLowBase) / 2;
  ctx.font = "8px monospace"; ctx.fillStyle = "#FF1744"; ctx.globalAlpha = 0.4;
  ctx.textAlign = "center";
  ctx.fillText(`↓ ${Math.abs(Number(pctToBase))}%`, cx + midR1 * Math.cos(pullAngle1), cy + midR1 * Math.sin(pullAngle1));

  // Dashed line from ATH to golden zone
  const pullAngle2 = -Math.PI * 0.45;
  ctx.beginPath();
  ctx.moveTo(cx + rATH * Math.cos(pullAngle2), cy + rATH * Math.sin(pullAngle2));
  ctx.lineTo(cx + rHighBase * Math.cos(pullAngle2), cy + rHighBase * Math.sin(pullAngle2));
  ctx.strokeStyle = "#FFD700"; ctx.globalAlpha = 0.2; ctx.lineWidth = 1.5;
  ctx.stroke(); ctx.globalAlpha = 1;

  const pctATHtoHigh = ((proj.highRange.base / ath - 1) * 100).toFixed(0);
  const midR2 = (rATH + rHighBase) / 2;
  ctx.font = "8px monospace"; ctx.fillStyle = "#FFD700"; ctx.globalAlpha = 0.4;
  ctx.textAlign = "center";
  ctx.fillText(`↑ ${pctATHtoHigh}%`, cx + midR2 * Math.cos(pullAngle2), cy + midR2 * Math.sin(pullAngle2));

  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // ═════════════════════════════════════════════
  // CENTER — the thesis
  // ═════════════════════════════════════════════
  ctx.textAlign = "center";
  ctx.font = "bold 11px monospace"; ctx.fillStyle = "rgba(255,255,255,0.3)";
  ctx.fillText("BUY THE BLOOD", cx, cy - 10);
  ctx.fillText("SELL THE GOLD", cx, cy + 6);
  ctx.font = "9px monospace"; ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fillText(`${multiplierToHigh}× POTENTIAL`, cx, cy + 22);

  // ═════════════════════════════════════════════
  // BOTTOM INFO CARDS
  // ═════════════════════════════════════════════
  const fromLow = ((currentPrice / proj.lowRange.base - 1) * 100).toFixed(0);
  const fromHigh = ((proj.highRange.base / currentPrice - 1) * 100).toFixed(0);

  // Momentum label for display
  const momIcon = momentum.signal === 1 ? "▲ BULL" : momentum.signal === -1 ? "▼ BEAR" : "● NEUTRAL";
  const momDetail = `20d: ${(momentum.m20*100).toFixed(1)}% · 60d: ${(momentum.m60*100).toFixed(1)}%`;

  document.getElementById("bottomBar").innerHTML = `
    <div class="bottom-card">
      <div class="lbl">CURRENT PRICE</div>
      <div class="val" style="color:${curColor}">$${fmtP(currentPrice)}</div>
      <div class="sub" style="color:${curColor}">${momIcon}</div>
    </div>
    <div class="bottom-card">
      <div class="lbl">DUAL MOMENTUM</div>
      <div class="val" style="color:${curColor};font-size:14px">${momDetail}</div>
      <div class="sub">20d/60d ROC · 5d confirm</div>
    </div>
    <div class="bottom-card">
      <div class="lbl">PROJECTED LOW</div>
      <div class="val" style="color:#FF1744">$${fmtP(proj.lowRange.base)}</div>
      <div class="sub">−75% from ATH · Buy target</div>
    </div>
    <div class="bottom-card">
      <div class="lbl">PROJECTED HIGH</div>
      <div class="val" style="color:#FFD700">$${fmtP(proj.highRange.base)}</div>
      <div class="sub">2× ATH · Sell target</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════
function animate() {
  if (animProgress < 1) {
    animProgress += 0.02;
    if (animProgress > 1) animProgress = 1;
    draw();
    requestAnimationFrame(animate);
  }
}

// ═══════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════
let dotCount = 0;
const dotTimer = setInterval(() => {
  dotCount = (dotCount + 1) % 4;
  const el = document.getElementById("dots");
  if (el) el.textContent = ".".repeat(dotCount);
}, 400);

async function main() {
  const result = await fetchBTCData();
  clearInterval(dotTimer);

  if (!result.data.length) {
    document.getElementById("loading").innerHTML = '<div class="loading-text" style="color:#FF1744">NO DATA</div>';
    return;
  }

  allData = result.data;
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("badgeText").textContent = `LIVE · ${result.source}`;

  animate();

  // Redraw on resize
  window.addEventListener("resize", () => { if (animProgress >= 1) draw(); });
}

main();
</script>
</body>
</html>
