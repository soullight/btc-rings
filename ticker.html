<script>
(function(){
'use strict';

const G='#00E676',R='#FF1744',GOLD='#FFD700',CYAN='#4FC3F7',BG='#0a0a0f',PURPLE='#E040FB';

const $=id=>document.getElementById(id);
const canvas=$('c');
const ctx=canvas.getContext('2d');

let dc=0;
setInterval(()=>{dc=(dc+1)%4;const d=$('dots');if(d)d.textContent='.'.repeat(dc);},400);

function fmt(n,d=0){
  if(!n||isNaN(n))return'—';
  if(Math.abs(n)>=1000)return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  if(Math.abs(n)>=1)return'$'+Number(n).toFixed(2);
  return'$'+Number(n).toPrecision(4);
}
function fmtPct(n){return(n>=0?'+':'')+n.toFixed(1)+'%';}

async function apiFetch(url,timeout=20000){
  const c=new AbortController();const t=setTimeout(()=>c.abort(),timeout);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
  catch(e){clearTimeout(t);throw e;}
}

// ═══════════════════════════════════════════════════════════
// API KEY MANAGEMENT
// ═══════════════════════════════════════════════════════════
function getApiKey(){
  return localStorage.getItem('td_api_key') || '';
}
function saveApiKey(key){
  localStorage.setItem('td_api_key', key.trim());
  updateKeyStatus();
}
function updateKeyStatus(){
  const key = getApiKey();
  const el = $('key-status');
  if(key){
    el.textContent = '✓ SAVED';
    el.style.color = G;
    $('api-key-input').value = key.slice(0,8) + '••••••••';
  } else {
    el.textContent = 'CRYPTO WORKS WITHOUT KEY';
    el.style.color = 'rgba(255,255,255,0.2)';
  }
}

// Save key on blur/enter
$('api-key-input').addEventListener('blur', function(){
  const v = this.value.trim();
  if(v && !v.includes('••')) saveApiKey(v);
});
$('api-key-input').addEventListener('keydown', function(e){
  if(e.key==='Enter'){this.blur();}
});
$('api-key-input').addEventListener('focus', function(){
  const key = getApiKey();
  if(key) this.value = key; // show full key on focus for editing
});

// ═══════════════════════════════════════════════════════════
// TROUGH DETECTION
// ═══════════════════════════════════════════════════════════
function detectTroughs(closes,hw){
  const t=[];
  for(let i=hw;i<closes.length-hw;i++){
    let ok=true;
    for(let j=1;j<=hw;j++){if(closes[i]>closes[i-j]||closes[i]>closes[i+j]){ok=false;break;}}
    if(ok)t.push(i);
  }
  return t;
}
function filterTroughs(raw,closes,minGap){
  if(!raw.length)return raw;
  const f=[raw[0]];
  for(let i=1;i<raw.length;i++){
    if(raw[i]-f[f.length-1]>=minGap)f.push(raw[i]);
    else if(closes[raw[i]]<closes[f[f.length-1]])f[f.length-1]=raw[i];
  }
  return f;
}

// ═══════════════════════════════════════════════════════════
// DATA SOURCES
// ═══════════════════════════════════════════════════════════

function isCrypto(ticker){
  const t = ticker.toUpperCase().replace(/[-_ ]/g,'');
  if(t.endsWith('USDT')||t.endsWith('BUSD')) return true;
  // Common crypto bases
  const bases = ['BTC','ETH','SOL','BNB','XRP','ADA','DOGE','AVAX','DOT','LINK',
    'MATIC','LTC','UNI','ATOM','NEAR','APT','OP','ARB','SUI','PEPE','SHIB',
    'FIL','HBAR','ICP','VET','ALGO','FTM','SAND','MANA','AXS','AAVE','CRV',
    'MKR','SNX','COMP','SUSHI','YFI','RUNE','INJ','TIA','SEI','JUP','WIF',
    'BONK','FLOKI','ONDO','RENDER','FET','TAO','JASMY','KAS','TON'];
  const clean = t.replace(/USD$/,'').replace(/USDT$/,'').replace(/BUSD$/,'');
  if(bases.includes(clean)) return true;
  if(t.endsWith('USD') && bases.includes(t.replace(/USD$/,''))) return true;
  return false;
}

function normalizeCryptoTicker(ticker){
  let t = ticker.toUpperCase().replace(/[-_ ]/g,'');
  if(t.endsWith('USDT')||t.endsWith('BUSD')) return t;
  if(t.endsWith('USD')) t = t.slice(0,-3);
  return t + 'USDT';
}

// Map a ticker to a Coinbase product id, e.g. BTC -> BTC-USD
function coinbaseProduct(ticker){
  let t = ticker.toUpperCase().replace(/[-_ ]/g,'');
  t = t.replace(/USDT$/,'').replace(/BUSD$/,'').replace(/USD$/,'');
  return t + '-USD';
}

// ── COINBASE (crypto, no key, works from US — Binance is geo-blocked) ──
// Coinbase candle: [t_s, low, high, open, close, vol] newest-first.
async function fetchCoinbaseCrypto(ticker, rangeDays){
  const prod = coinbaseProduct(ticker);
  const G = 86400; const startS0 = Math.floor((Date.now() - rangeDays * 864e5)/1000);
  let endS = Math.floor(Date.now()/1000); const map=new Map(); let guard=0;
  while(endS > startS0 && guard < 30){
    guard++; const startS = Math.max(startS0, endS - G*299);
    const url = `https://api.exchange.coinbase.com/products/${prod}/candles?granularity=${G}&start=${startS}&end=${endS}`;
    let arr; try { arr = await apiFetch(url); } catch(e){ break; }
    if(!Array.isArray(arr) || !arr.length) break;
    for(const k of arr) map.set(k[0], {t:k[0]*1000, o:k[3], h:k[2], l:k[1], c:k[4]});
    const newEnd = arr[arr.length-1][0] - G; if(newEnd >= endS || startS <= startS0) break; endS = newEnd;
  }
  return [...map.values()].sort((a,b)=>a.t-b.t);
}

// ── BINANCE (crypto fallback; geo-blocked in US) ──
async function fetchBinance(ticker, rangeDays){
  const sym = normalizeCryptoTicker(ticker);
  const all=[];
  let startTime = Date.now() - rangeDays * 864e5;
  const now = Date.now();
  while(startTime < now){
    const url=`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1d&startTime=${startTime}&limit=1000`;
    const batch = await apiFetch(url);
    if(!batch||!batch.length) break;
    for(const k of batch) all.push({t:+k[0], o:+k[1], h:+k[2], l:+k[3], c:+k[4]});
    startTime = +batch[batch.length-1][0] + 86400000;
    if(batch.length<1000) break;
  }
  return all;
}

// ── TWELVE DATA (stocks/ETFs/forex, free key) ──
async function fetchTwelveData(ticker, rangeDays){
  const key = getApiKey();
  if(!key) throw new Error('API key required for stocks — get a free one at twelvedata.com/register');

  const sym = ticker.toUpperCase();
  // Twelve Data uses outputsize (max 5000) and start_date/end_date
  const endDate = new Date();
  const startDate = new Date(Date.now() - rangeDays * 864e5);
  const fmtDate = d => d.toISOString().split('T')[0];

  const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=1day&start_date=${fmtDate(startDate)}&end_date=${fmtDate(endDate)}&order=ASC&apikey=${key}`;

  const data = await apiFetch(url);

  if(data.status === 'error'){
    if(data.message && data.message.includes('api_key')) throw new Error('Invalid API key — check your Twelve Data key');
    throw new Error(data.message || 'Twelve Data error');
  }

  const values = data.values;
  if(!values || !values.length) throw new Error('No data returned for ' + sym);

  return values.map(v => ({
    t: new Date(v.datetime).getTime(),
    o: parseFloat(v.open),
    h: parseFloat(v.high),
    l: parseFloat(v.low),
    c: parseFloat(v.close)
  }));
}

// ── UNIFIED FETCH ──
async function fetchData(ticker, rangeDays){
  if(isCrypto(ticker)){
    // Coinbase primary (works from US); Binance fallback.
    const d = await fetchCoinbaseCrypto(ticker, rangeDays);
    if(d && d.length) return d;
    return await fetchBinance(ticker, rangeDays);
  } else {
    return await fetchTwelveData(ticker, rangeDays);
  }
}

// ═══════════════════════════════════════════════════════════
// BUILD SEGMENTS
// ═══════════════════════════════════════════════════════════
let segments = [];
let globalHi=0, globalLo=Infinity;
let livePrice=0, totalDays=0;
let ath=0, athDay=0;
let currentTicker='';
let NOM=60;
let dataSource='';

async function buildSegments(daily){
  segments = [];
  globalHi = 0;
  globalLo = Infinity;

  const closes = daily.map(k=>k.c);
  const highs = daily.map(k=>k.h);
  const lows = daily.map(k=>k.l);
  const n = daily.length;

  ath = Math.max(...highs);
  athDay = highs.indexOf(ath);

  // Adaptive trough detection
  const hw = Math.max(4, Math.round(NOM * 0.2));
  const minGap = Math.max(10, Math.round(NOM * 0.5));

  let troughs = detectTroughs(closes, hw);
  troughs = filterTroughs(troughs, closes, minGap);

  if(troughs.length < 2){
    troughs = detectTroughs(closes, Math.max(3, hw-3));
    troughs = filterTroughs(troughs, closes, minGap);
  }
  if(troughs.length && troughs[0] > Math.round(NOM*0.25)) troughs.unshift(0);

  totalDays = n;

  for(let i=0; i<troughs.length; i++){
    const si = troughs[i];
    const ei = (i < troughs.length-1) ? troughs[i+1] : n-1;
    const isLast = i === troughs.length-1;

    const segH = highs.slice(si, ei+1);
    const segL = lows.slice(si, ei+1);
    const segC = closes.slice(si, ei+1);
    const cHi = Math.max(...segH);
    const cLo = Math.min(...segL);
    const peakIdx = segH.indexOf(cHi);
    const daysInCycle = ei - si;

    if(cHi > globalHi) globalHi = cHi;
    if(cLo < globalLo) globalLo = cLo;

    let declining = false;
    if(!isLast){
      declining = segC[segC.length-1] < segC[0] * 0.95;
    } else {
      const drop = (cHi - segC[segC.length-1]) / cHi;
      const daysPastPeak = daysInCycle - peakIdx;
      declining = (drop >= 0.10) || (drop >= 0.06 && daysPastPeak >= 5) || (daysInCycle >= NOM*0.67 && drop >= 0.05);
    }

    const wave = segC.map((c,j) => ({
      day: si+j, close: c, high: segH[j], low: segL[j]
    }));

    segments.push({
      startDay:si, endDay:ei, cHi, cLo,
      peakDay:si+peakIdx, declining, wave, isLast,
      troughPrice:closes[si], days:daysInCycle
    });
  }

  livePrice = closes[n-1];
}

// ═══════════════════════════════════════════════════════════
// LIVE PRICE
// ═══════════════════════════════════════════════════════════
let ws=null, wsRetry=1000, poll=null;

function stopLive(){
  if(ws){try{ws.close();}catch(e){} ws=null;}
  if(poll){clearInterval(poll); poll=null;}
}

function startLive(ticker){
  stopLive();
  if(isCrypto(ticker)){
    // Binance WebSocket — real-time, no key
    const sym = normalizeCryptoTicker(ticker).toLowerCase();
    try{
      ws = new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@trade`);
      ws.onopen = ()=>{wsRetry=1000;};
      ws.onmessage = e=>{try{livePrice=parseFloat(JSON.parse(e.data).p);}catch(e){}};
      ws.onclose = ()=>{setTimeout(()=>startLive(ticker), wsRetry); wsRetry=Math.min(wsRetry*2,30000);};
      ws.onerror = ()=>ws.close();
    }catch(e){startPollFallback(ticker);}
  } else {
    // Twelve Data price polling — every 15s (conserve rate limit)
    startStockPoll(ticker);
  }
}

function startPollFallback(ticker){
  if(poll) return;
  const sym = normalizeCryptoTicker(ticker);
  poll = setInterval(async()=>{
    try{
      const d = await apiFetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`,5000);
      livePrice = parseFloat(d.price);
    }catch(e){}
  },5000);
}

function startStockPoll(ticker){
  if(poll) return;
  const key = getApiKey();
  if(!key) return;
  const sym = ticker.toUpperCase();
  // Immediate first fetch
  (async()=>{
    try{
      const d = await apiFetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(sym)}&apikey=${key}`,5000);
      if(d.price) livePrice = parseFloat(d.price);
    }catch(e){}
  })();
  // Then poll every 15s
  poll = setInterval(async()=>{
    try{
      const d = await apiFetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(sym)}&apikey=${key}`,5000);
      if(d.price) livePrice = parseFloat(d.price);
    }catch(e){}
  },15000);
}

// ═══════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════
function resize(){
  const maxW = window.innerWidth - 24;
  const maxH = window.innerHeight - 240;
  const sz = Math.min(maxW, maxH, 800);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = sz*dpr; canvas.height = sz*dpr;
  canvas.style.width = sz+'px'; canvas.style.height = sz+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function draw(){
  const w = parseInt(canvas.style.width);
  const h = parseInt(canvas.style.height);
  const cxc = w/2, cyc = h/2;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,w,h);

  if(!segments.length){requestAnimationFrame(draw);return;}

  const outerR = Math.min(cxc,cyc) - 44;
  const innerR = outerR * 0.18;

  const scaleMin = globalLo * 0.95;
  const scaleMax = globalHi * 1.02;

  function priceToR(p){
    const t = (p - scaleMin) / (scaleMax - scaleMin || 1);
    return innerR + Math.max(0, Math.min(1, t)) * (outerR - innerR);
  }
  function dayToAngle(day){
    return (day / totalDays) * Math.PI * 2 - Math.PI / 2;
  }

  // ── OUTER RING ──
  ctx.beginPath();ctx.arc(cxc,cyc,outerR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.stroke();

  // ── ATH REFERENCE — bold gold radial ──
  const athAngle = dayToAngle(athDay);
  ctx.beginPath();
  ctx.moveTo(cxc+Math.cos(athAngle)*(innerR-8), cyc+Math.sin(athAngle)*(innerR-8));
  ctx.lineTo(cxc+Math.cos(athAngle)*(outerR+6), cyc+Math.sin(athAngle)*(outerR+6));
  ctx.strokeStyle=GOLD; ctx.lineWidth=2; ctx.stroke();
  // ATH label
  ctx.save();
  ctx.font='bold 8px "SF Mono",monospace';
  ctx.fillStyle=GOLD; ctx.textAlign='center';
  ctx.fillText('ATH '+fmt(ath), cxc+Math.cos(athAngle)*(outerR+22), cyc+Math.sin(athAngle)*(outerR+22));
  ctx.restore();

  // ── LIVE PRICE RADAR RING ──
  if(livePrice > 0){
    const priceR = priceToR(livePrice);
    if(priceR >= innerR && priceR <= outerR){
      ctx.beginPath();ctx.arc(cxc,cyc,priceR,0,Math.PI*2);
      ctx.strokeStyle='rgba(0,230,118,0.45)';ctx.lineWidth=1.5;ctx.stroke();
    }
    // Price at 3 o'clock
    ctx.save();
    ctx.font='bold 9px "SF Mono",monospace';
    ctx.fillStyle=G;
    ctx.textAlign='left';ctx.textBaseline='middle';
    const dispR = Math.max(innerR, Math.min(outerR, priceR));
    ctx.fillText(fmt(livePrice), cxc+dispR+8, cyc);
    ctx.restore();
  }

  // ── SEGMENTS ──
  segments.forEach((seg,si) => {
    const col = seg.declining ? R : G;
    const cr = seg.declining ? 255 : 0;
    const cg = seg.declining ? 23 : 230;
    const cb = seg.declining ? 68 : 118;

    const a0 = dayToAngle(seg.startDay);
    const a1 = dayToAngle(seg.endDay);
    const wave = seg.wave;

    if(wave.length < 2){
      ctx.beginPath();
      ctx.arc(cxc, cyc, priceToR(seg.cHi), a0, a1);
      ctx.arc(cxc, cyc, priceToR(seg.cLo), a1, a0, true);
      ctx.closePath();
      ctx.fillStyle=`rgba(${cr},${cg},${cb},0.45)`;
      ctx.fill();
    } else {
      // High/low ribbon
      const pts=[], ptsLo=[];
      for(let i=0;i<wave.length;i++){
        const a=dayToAngle(wave[i].day);
        pts.push({a, r:priceToR(wave[i].high)});
        ptsLo.push({a, r:priceToR(wave[i].low)});
      }
      ctx.beginPath();
      for(let i=0;i<pts.length;i++){
        const x=cxc+Math.cos(pts[i].a)*pts[i].r;
        const y=cyc+Math.sin(pts[i].a)*pts[i].r;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      for(let i=ptsLo.length-1;i>=0;i--){
        const x=cxc+Math.cos(ptsLo[i].a)*ptsLo[i].r;
        const y=cyc+Math.sin(ptsLo[i].a)*ptsLo[i].r;
        ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fillStyle=`rgba(${cr},${cg},${cb},0.35)`;
      ctx.fill();

      // Close line
      ctx.beginPath();
      for(let i=0;i<wave.length;i++){
        const a=dayToAngle(wave[i].day);
        const r=priceToR(wave[i].close);
        const x=cxc+Math.cos(a)*r;
        const y=cyc+Math.sin(a)*r;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.strokeStyle=`rgba(${cr},${cg},${cb},0.9)`;
      ctx.lineWidth=1.5;
      ctx.stroke();
    }

    // Cycle boundary tick
    ctx.beginPath();
    ctx.moveTo(cxc+Math.cos(a0)*innerR, cyc+Math.sin(a0)*innerR);
    ctx.lineTo(cxc+Math.cos(a0)*(innerR-10), cyc+Math.sin(a0)*(innerR-10));
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.stroke();

    // Cycle number
    ctx.save();
    const numA=(a0+a1)/2;
    const numR=innerR*0.7;
    ctx.font='bold 9px "SF Mono",monospace';
    ctx.fillStyle=seg.declining?'rgba(255,23,68,0.7)':'rgba(0,230,118,0.7)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(si+1,cxc+Math.cos(numA)*numR,cyc+Math.sin(numA)*numR);
    ctx.restore();
  });

  // ── CENTER ──
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 14px "SF Mono",monospace';
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText(currentTicker, cxc, cyc-8);
  ctx.font='9px "SF Mono",monospace';
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText(NOM+'-DAY CYCLES', cxc, cyc+8);
  ctx.restore();

  requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════
function buildHud(){
  const rising = segments.filter(s=>!s.declining).length;
  const declining = segments.filter(s=>s.declining).length;
  const fromAth = ath > 0 ? ((livePrice-ath)/ath*100) : 0;

  // Win rate
  const completed = segments.filter(s=>!s.isLast);
  const wins = completed.filter(s=>!s.declining).length;
  const winRate = completed.length ? (wins/completed.length*100) : 0;

  // Current cycle stats
  const curr = segments[segments.length-1];
  const currChange = curr ? ((curr.wave[curr.wave.length-1].close - curr.troughPrice)/curr.troughPrice*100) : 0;

  const cards = [
    {lbl:'CYCLES',val:segments.length,col:'#fff'},
    {lbl:'RISING',val:rising,col:G},
    {lbl:'DECLINING',val:declining,col:R},
    {lbl:'WIN RATE',val:winRate.toFixed(0)+'%',col:winRate>=50?G:R},
    {lbl:'ATH',val:fmt(ath),col:GOLD},
    {lbl:'FROM ATH',val:fmtPct(fromAth),col:fromAth>=0?G:R},
    {lbl:'THIS CYCLE',val:fmtPct(currChange),col:currChange>=0?G:R},
    {lbl:'CURRENT',val:fmt(livePrice),col:G},
  ];

  $('hud').innerHTML = cards.map(c =>
    `<div class="hud-card"><div class="lbl">${c.lbl}</div><div class="val" style="color:${c.col}">${c.val}</div></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════
// GO
// ═══════════════════════════════════════════════════════════
let running = false;

async function go(){
  if(running) return;
  running = true;

  const ticker = $('ticker-input').value.trim();
  const rangeDays = parseInt($('range-select').value) || 730;
  NOM = parseInt($('cycle-input').value) || 60;

  if(!ticker){
    $('error-msg').textContent = 'ENTER A TICKER';
    running = false;
    return;
  }

  $('error-msg').textContent = '';
  $('go-btn').disabled = true;
  $('go-btn').textContent = 'LOADING...';
  $('load').classList.remove('hide');
  $('load-ticker').textContent = ticker.toUpperCase();

  try {
    const daily = await fetchData(ticker, rangeDays);
    if(!daily || daily.length < 30){
      throw new Error('Not enough data — need at least 30 trading days');
    }

    currentTicker = ticker.toUpperCase();
    dataSource = isCrypto(ticker) ? 'COINBASE' : 'TWELVE DATA';
    $('source-tag').textContent = 'DATA: ' + dataSource + ' · ' + daily.length + ' DAYS';

    await buildSegments(daily);

    $('subtitle').textContent = NOM + '-DAY BRESSERT CYCLES — ' + currentTicker;

    resize();
    buildHud();
    startLive(ticker);

    $('load').classList.add('hide');

  } catch(e) {
    $('load').classList.add('hide');
    let msg = e.message || 'Unknown error';
    if(!isCrypto(ticker) && !getApiKey()){
      msg = 'STOCKS NEED AN API KEY — Get one free at twelvedata.com/register, paste it above';
    }
    $('error-msg').textContent = msg;
  }

  $('go-btn').disabled = false;
  $('go-btn').textContent = 'MAP IT';
  running = false;
}
window.go = go;

// Enter key
$('ticker-input').addEventListener('keydown', e=>{if(e.key==='Enter')go();});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(draw);
updateKeyStatus();

// Auto-load default (BTC — no key needed)
go();

// Live HUD updates
setInterval(()=>{if(segments.length)buildHud();},3000);

})();
</script>
