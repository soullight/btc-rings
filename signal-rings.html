<script>
// ═══════════════════════════════════════════════════════════════
// SIGNAL RINGS — MA Structure Visualization
// ═══════════════════════════════════════════════════════════════
//
// The rings represent REAL moving averages computed from price history.
// Each ring is a structural level. Price moves through them like water.
//
// RINGS (inside → outside):
//   200-Week SMA — the bedrock (cycle-level support)
//   200-Day SMA  — the trend line (macro direction)
//   50-Day SMA   — the momentum line (medium-term)
//   20-Day SMA   — the pulse (short-term action)
//   ATH          — the high-water mark (residue on the walls)
//
// Above all rings = full bull
// Dropping through = weakening
// Below all = bear
//
// This doesn't need updating. MAs compute themselves.
// Built to last 5-10 years.
// ═══════════════════════════════════════════════════════════════

let livePrice = 0;
let wsConnected = false;
let maData = {};
let cascadeResults = {};
let animProgress = 0;

// ── Ring definitions ──
const RINGS = [
  { key: 'sma200w', label: '200W', fullLabel: '200-WEEK SMA', color: '#FF1744', glowColor: 'rgba(255,23,68,0.3)', desc: 'BEDROCK' },
  { key: 'sma200d', label: '200D', fullLabel: '200-DAY SMA', color: '#FF9100', glowColor: 'rgba(255,145,0,0.3)', desc: 'TREND' },
  { key: 'sma50d',  label: '50D',  fullLabel: '50-DAY SMA',  color: '#FFEA00', glowColor: 'rgba(255,234,0,0.3)', desc: 'MOMENTUM' },
  { key: 'sma20d',  label: '20D',  fullLabel: '20-DAY SMA',  color: '#00E676', glowColor: 'rgba(0,230,118,0.3)', desc: 'PULSE' },
  { key: 'ath',     label: 'ATH',  fullLabel: 'ALL-TIME HIGH', color: '#E040FB', glowColor: 'rgba(224,64,251,0.2)', desc: 'HIGH WATER' },
];

// ── Cascade assets ──
const CASCADE = [
  { symbol: 'BTCUSDT', name: 'BTC' },
  { symbol: 'ETHUSDT', name: 'ETH' },
  { symbol: 'SOLUSDT', name: 'SOL' },
  { symbol: 'XRPUSDT', name: 'XRP' },
  { symbol: 'TIAUSDT', name: 'TIA' },
  { symbol: 'TRXUSDT', name: 'TRX' },
];

// ═══════════════════════════════════════════════════════════════
// DATA FETCHING
// ═══════════════════════════════════════════════════════════════

function calcSMA(closes, period) {
  if (closes.length < period) return null;
  const slice = closes.slice(-period);
  return slice.reduce((a,b) => a+b, 0) / period;
}

function calcEMA(closes, period) {
  if (closes.length < period) return null;
  const mult = 2 / (period + 1);
  let ema = closes.slice(0, period).reduce((a,b) => a+b, 0) / period;
  for (let i = period; i < closes.length; i++) {
    ema = (closes[i] - ema) * mult + ema;
  }
  return ema;
}

// ── DATA SOURCE: Coinbase primary (Binance geo-blocked in US) ──
// fetchKlines returns Binance-shaped arrays so all downstream math is unchanged.
// Binance kline indices used downstream: [2]=high, [4]=close, [0]=openTime(ms).
// Coinbase candle shape: [time(s), low, high, open, close, vol] (newest-first).
function cbProduct(symbol){
  // BTCUSDT -> BTC-USD, ETHUSDT -> ETH-USD, etc.
  return symbol.replace(/USDT$/,'').replace(/USD$/,'') + '-USD';
}
async function _fetchJSON(url, timeout=8000){
  const c=new AbortController(), t=setTimeout(()=>c.abort(), timeout);
  try{ const r=await fetch(url,{signal:c.signal}); clearTimeout(t);
    if(!r.ok) throw new Error('HTTP '+r.status); return await r.json(); }
  catch(e){ clearTimeout(t); throw e; }
}
// Fetch `count` daily Coinbase candles (paginated, max 300/req), ascending, Binance-shaped.
async function _coinbaseDaily(product, count){
  const G=86400; let endS=Math.floor(Date.now()/1000); const out=[]; let guard=0;
  // Coinbase caps ~300 candles/req; page back with a fixed 300-day window.
  while(out.length < count && guard < 30){
    guard++;
    const startS=endS - G*299;
    const url=`https://api.exchange.coinbase.com/products/${product}/candles?granularity=${G}&start=${startS}&end=${endS}`;
    const c=await _fetchJSON(url); // newest-first [t,low,high,open,close,vol]
    if(!Array.isArray(c) || !c.length) break;
    // map to Binance shape: [openTimeMs, open, high, low, close, vol]
    const mapped=c.map(k=>[k[0]*1000, k[3], k[2], k[1], k[4], k[5]]);
    out.unshift(...mapped.slice().reverse()); // ascending
    const newEnd=c[c.length-1][0]-G;
    if(newEnd >= endS) break; // no progress
    endS=newEnd;
  }
  // de-dupe by openTime, keep ascending
  const seen=new Set(); const asc=out.filter(k=>{if(seen.has(k[0]))return false;seen.add(k[0]);return true;});
  asc.sort((a,b)=>a[0]-b[0]);
  return asc;
}
// Aggregate ascending daily klines into weekly klines (Binance-shaped).
function _toWeekly(daily){
  const wk=[];
  for(let i=0;i<daily.length;i+=7){
    const chunk=daily.slice(i,i+7); if(!chunk.length) break;
    const high=Math.max(...chunk.map(k=>+k[2]));
    const close=+chunk[chunk.length-1][4];
    wk.push([chunk[0][0], chunk[0][1], high, chunk[0][3], close, 0]);
  }
  return wk;
}
async function fetchKlines(symbol, interval, limit) {
  const product=cbProduct(symbol);
  try{
    if(interval==='1w'){
      const daily=await _coinbaseDaily(product, limit*7);
      const wk=_toWeekly(daily);
      if(wk.length>10) return wk.slice(-limit);
    } else {
      const daily=await _coinbaseDaily(product, limit);
      if(daily.length>10) return daily.slice(-limit);
    }
  }catch(e){ console.warn('Coinbase fail', symbol, interval, e); }
  // last-resort: Binance (works outside US / via VPN)
  const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Binance ${r.status}`);
  return await r.json();
}

async function fetchAllBTCData() {
  // Fetch daily (250 days for 200-day SMA)
  const daily = await fetchKlines('BTCUSDT', '1d', 250);
  const dailyCloses = daily.map(k => parseFloat(k[4]));
  const dailyHighs = daily.map(k => parseFloat(k[2]));

  // Fetch weekly (210 weeks for 200-week SMA)
  const weekly = await fetchKlines('BTCUSDT', '1w', 210);
  const weeklyCloses = weekly.map(k => parseFloat(k[4]));

  const price = dailyCloses[dailyCloses.length - 1];
  const ath = Math.max(...dailyHighs, ...weeklyCloses);

  maData = {
    price,
    ath: Math.max(ath, 109350), // known ATH floor
    sma200w: calcSMA(weeklyCloses, 200),
    sma200d: calcSMA(dailyCloses, 200),
    sma128d: calcSMA(dailyCloses, 128),
    sma50d: calcSMA(dailyCloses, 50),
    sma20d: calcSMA(dailyCloses, 20),
    ema200d: calcEMA(dailyCloses, 200),
    roc20: dailyCloses.length > 20 ? ((price - dailyCloses[dailyCloses.length - 21]) / dailyCloses[dailyCloses.length - 21] * 100) : null,
    roc60: dailyCloses.length > 60 ? ((price - dailyCloses[dailyCloses.length - 61]) / dailyCloses[dailyCloses.length - 61] * 100) : null,
  };

  livePrice = price;
  return maData;
}

async function fetchCascadeData() {
  for (const asset of CASCADE) {
    try {
      const daily = await fetchKlines(asset.symbol, '1d', 210);
      const weekly = await fetchKlines(asset.symbol, '1w', 210);
      const dc = daily.map(k => parseFloat(k[4]));
      const wc = weekly.map(k => parseFloat(k[4]));
      const p = dc[dc.length - 1];

      const checks = {
        '200W': calcSMA(wc, 200) ? p > calcSMA(wc, 200) : null,
        '200D': calcSMA(dc, 200) ? p > calcSMA(dc, 200) : null,
        '50D': calcSMA(dc, 50) ? p > calcSMA(dc, 50) : null,
        '20D': calcSMA(dc, 20) ? p > calcSMA(dc, 20) : null,
      };

      const above = Object.values(checks).filter(v => v === true).length;
      const total = Object.values(checks).filter(v => v !== null).length;
      const roc30 = dc.length > 30 ? ((p - dc[dc.length - 31]) / dc[dc.length - 31] * 100) : 0;

      cascadeResults[asset.name] = { price: p, checks, above, total, roc30 };
      await new Promise(r => setTimeout(r, 150));
    } catch(e) {
      cascadeResults[asset.name] = { error: true };
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// WEBSOCKET — live price updates
// ═══════════════════════════════════════════════════════════════

function connectWS() {
  // Coinbase WS (Binance geo-blocked in US)
  const ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
  ws.onopen = () => {
    wsConnected = true; updateBadge();
    ws.send(JSON.stringify({type:'subscribe',product_ids:['BTC-USD'],channels:['ticker']}));
  };
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.type === 'ticker' && d.price) {
      livePrice = parseFloat(d.price);
      maData.price = livePrice;
    }
  };
  ws.onclose = () => { wsConnected = false; updateBadge(); setTimeout(connectWS, 5000); };
  ws.onerror = () => ws.close();
}

function updateBadge() {
  const el = document.getElementById('badgeText');
  el.textContent = wsConnected ? 'LIVE' : 'RECONNECTING...';
}

// ═══════════════════════════════════════════════════════════════
// CANVAS RENDERING — The Rings
// ═══════════════════════════════════════════════════════════════

function drawRings(canvas, ctx) {
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;
  const cy = H / 2;
  const maxR = Math.min(W, H) * 0.42;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  if (!maData.price) return;

  const price = maData.price;

  // Build ring data: value → radius mapping
  // All values mapped to radii. ATH = outermost ring. 200W = innermost.
  // Radius is proportional to price level relative to a floor.
  const floor = maData.sma200w ? maData.sma200w * 0.7 : price * 0.5;
  const ceiling = maData.ath * 1.05;

  function priceToRadius(p) {
    if (!p) return 0;
    // Log scale for better visual spread
    const logFloor = Math.log(floor);
    const logCeil = Math.log(ceiling);
    const logP = Math.log(Math.max(p, floor));
    const pct = (logP - logFloor) / (logCeil - logFloor);
    return pct * maxR * animProgress;
  }

  const ringValues = [
    { ...RINGS[0], value: maData.sma200w },
    { ...RINGS[1], value: maData.sma200d },
    { ...RINGS[2], value: maData.sma50d },
    { ...RINGS[3], value: maData.sma20d },
    { ...RINGS[4], value: maData.ath },
  ].filter(r => r.value);

  // Sort by value (smallest radius first)
  ringValues.sort((a, b) => a.value - b.value);

  // Draw subtle grid circles
  for (let i = 1; i <= 5; i++) {
    const r = (maxR * i / 5) * animProgress;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw water fill — everything below price is "filled"
  const priceR = priceToRadius(price);
  if (priceR > 0) {
    const waterGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, priceR);
    // Determine water color based on structure
    let aboveCount = 0;
    ringValues.forEach(r => { if (r.key !== 'ath' && price > r.value) aboveCount++; });
    const totalMAs = ringValues.filter(r => r.key !== 'ath').length;
    const healthPct = aboveCount / totalMAs;

    if (healthPct >= 0.75) {
      // Strong — green water
      waterGrad.addColorStop(0, 'rgba(0,230,118,0.12)');
      waterGrad.addColorStop(0.7, 'rgba(0,230,118,0.06)');
      waterGrad.addColorStop(1, 'rgba(0,230,118,0.02)');
    } else if (healthPct >= 0.5) {
      // OK — amber water
      waterGrad.addColorStop(0, 'rgba(255,145,0,0.10)');
      waterGrad.addColorStop(0.7, 'rgba(255,145,0,0.05)');
      waterGrad.addColorStop(1, 'rgba(255,145,0,0.02)');
    } else {
      // Weak — red water
      waterGrad.addColorStop(0, 'rgba(255,23,68,0.10)');
      waterGrad.addColorStop(0.7, 'rgba(255,23,68,0.05)');
      waterGrad.addColorStop(1, 'rgba(255,23,68,0.02)');
    }

    ctx.beginPath();
    ctx.arc(cx, cy, priceR, 0, Math.PI * 2);
    ctx.fillStyle = waterGrad;
    ctx.fill();
  }

  // Draw each MA ring
  ringValues.forEach((ring, i) => {
    const r = priceToRadius(ring.value);
    if (r <= 0) return;

    const isAbove = price > ring.value;
    const opacity = isAbove ? 0.5 : 0.9;

    // Glow
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = ring.glowColor;
    ctx.lineWidth = isAbove ? 2 : 4;
    ctx.stroke();

    // Main ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = ring.color + (isAbove ? '80' : 'FF');
    ctx.lineWidth = isAbove ? 1.5 : 2.5;
    ctx.setLineDash(isAbove ? [4, 4] : []);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label on ring
    const labelAngle = -Math.PI / 2 + (i * 0.35) - 0.4;
    const lx = cx + Math.cos(labelAngle) * (r + 14);
    const ly = cy + Math.sin(labelAngle) * (r + 14);

    ctx.font = '600 9px "SF Mono", monospace';
    ctx.fillStyle = ring.color + (isAbove ? '90' : 'FF');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ring.label, lx, ly);

    // Price label on opposite side
    const pAngle = labelAngle + Math.PI;
    const px = cx + Math.cos(pAngle) * (r + 14);
    const py = cy + Math.sin(pAngle) * (r + 14);
    ctx.font = '500 8px "SF Mono", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('$' + ring.value.toLocaleString('en-US', {maximumFractionDigits: 0}), px, py);
  });

  // Draw price marker — the "water level"
  if (priceR > 0) {
    // Pulsing ring at price level
    const pulseScale = 1 + Math.sin(Date.now() / 400) * 0.015;
    const pr = priceR * pulseScale;

    // Price ring
    ctx.beginPath();
    ctx.arc(cx, cy, pr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Outer glow
    ctx.beginPath();
    ctx.arc(cx, cy, pr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 8;
    ctx.stroke();

    // Price text at center
    ctx.font = '700 26px "SF Mono", monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$' + price.toLocaleString('en-US', {maximumFractionDigits: 0}), cx, cy - 12);

    // "YOU ARE HERE" label
    ctx.font = '600 9px "SF Mono", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('YOU ARE HERE', cx, cy + 10);

    // Structure count
    let aboveCount = 0;
    const maRings = ringValues.filter(r => r.key !== 'ath');
    maRings.forEach(r => { if (price > r.value) aboveCount++; });

    const structLabel = aboveCount + '/' + maRings.length + ' MAs';
    const structColor = aboveCount >= 3 ? '#00E676' : aboveCount >= 2 ? '#FF9100' : '#FF1744';
    ctx.font = '700 11px "SF Mono", monospace';
    ctx.fillStyle = structColor;
    ctx.fillText(structLabel, cx, cy + 28);

    // Distance from ATH
    const athDist = ((price - maData.ath) / maData.ath * 100);
    ctx.font = '500 9px "SF Mono", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText(athDist.toFixed(1) + '% from ATH', cx, cy + 44);
  }

  // ATH high-water residue mark — subtle ring with "stain" effect
  const athRing = ringValues.find(r => r.key === 'ath');
  if (athRing) {
    const athR = priceToRadius(athRing.value);
    // Residue particles
    for (let i = 0; i < 24; i++) {
      const angle = (i / 24) * Math.PI * 2;
      const jitter = Math.sin(Date.now() / 2000 + i) * 2;
      const rx = cx + Math.cos(angle) * (athR + jitter);
      const ry = cy + Math.sin(angle) * (athR + jitter);
      ctx.beginPath();
      ctx.arc(rx, ry, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(224,64,251,0.15)';
      ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// SIGNAL COMPUTATION
// ═══════════════════════════════════════════════════════════════

function computeSignal() {
  if (!maData.price) return { signal: '---', action: '', color: '#fff', score: 0 };

  const p = maData.price;
  let score = 0;

  // MA structure scoring
  if (maData.sma200w && p > maData.sma200w) score += 2;
  else if (maData.sma200w) score -= 2;

  if (maData.sma200d && p > maData.sma200d) score += 1.5;
  else if (maData.sma200d) score -= 1.5;

  if (maData.sma50d && p > maData.sma50d) score += 1;
  else if (maData.sma50d) score -= 1;

  if (maData.sma20d && p > maData.sma20d) score += 0.5;
  else if (maData.sma20d) score -= 0.5;

  // Momentum bonus
  if (maData.roc20 > 0 && maData.roc60 > 0) score += 1;
  else if (maData.roc20 < 0 && maData.roc60 < 0) score -= 1;

  // Normalize to -2 to +2 range
  const maxScore = 7; // 2 + 1.5 + 1 + 0.5 + 1 + cascadeBonus
  const normalized = (score / maxScore) * 2;

  // Cascade bonus
  let cascadeOn = 0;
  let cascadeOff = 0;
  Object.values(cascadeResults).forEach(c => {
    if (c.error) return;
    if (c.above >= 3) cascadeOn++;
    else if (c.above <= 1) cascadeOff++;
  });

  let cascadeBonus = (cascadeOn - cascadeOff) * 0.3;
  const finalScore = Math.max(-2, Math.min(2, normalized + cascadeBonus));

  let signal, action, color;
  if (finalScore > 1.2) {
    signal = 'STRONG BUY'; action = 'Full position — all MAs supporting'; color = '#00E676';
  } else if (finalScore > 0.4) {
    signal = 'BUY BIAS'; action = 'Structure intact — lean long'; color = '#69F0AE';
  } else if (finalScore > -0.4) {
    signal = 'NEUTRAL'; action = 'No edge — wait for clarity'; color = '#FF9100';
  } else if (finalScore > -1.2) {
    signal = 'SELL BIAS'; action = 'Weakening — tighten stops'; color = '#FF6E40';
  } else {
    signal = 'STRONG SELL'; action = 'Below structure — exit or hedge'; color = '#FF1744';
  }

  return { signal, action, color, score: finalScore };
}

// ═══════════════════════════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════════════════════════

function renderStats() {
  const el = document.getElementById('stats');
  if (!maData.price) return;

  const items = [
    { label: '200W SMA', value: maData.sma200w, key: 'sma200w' },
    { label: '200D SMA', value: maData.sma200d, key: 'sma200d' },
    { label: '50D SMA', value: maData.sma50d, key: 'sma50d' },
    { label: '20D SMA', value: maData.sma20d, key: 'sma20d' },
    { label: 'ATH', value: maData.ath, key: 'ath' },
  ];

  el.innerHTML = items.map(item => {
    if (!item.value) return '';
    const above = maData.price > item.value;
    const pctDiff = ((maData.price - item.value) / item.value * 100);
    const ring = RINGS.find(r => r.key === item.key);
    const color = ring ? ring.color : '#fff';
    return `<div class="stat-card">
      <div class="lbl">${item.label}</div>
      <div class="val" style="color:${color}">$${item.value.toLocaleString('en-US', {maximumFractionDigits:0})}</div>
      <div class="sub" style="color:${above ? '#00E676' : '#FF1744'}">${above ? '▲' : '▼'} ${pctDiff.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function renderSignal() {
  const el = document.getElementById('signalPanel');
  const sig = computeSignal();
  el.innerHTML = `
    <div class="signal-big" style="color:${sig.color}">${sig.signal}</div>
    <div class="signal-sub">Composite: ${sig.score.toFixed(2)} / 2.00</div>
    <div class="signal-action" style="color:${sig.color}">${sig.action}</div>
  `;
  el.style.borderColor = sig.color + '30';
}

function renderCascade() {
  const el = document.getElementById('cascadeStrip');
  const btcRoc = cascadeResults['BTC'] ? cascadeResults['BTC'].roc30 : 0;

  el.innerHTML = CASCADE.map(asset => {
    const c = cascadeResults[asset.name];
    if (!c || c.error) return `<div class="cascade-card"><div class="c-name">${asset.name}</div><div class="c-rings">--</div></div>`;

    const relStr = asset.name === 'BTC' ? '' : (c.roc30 > btcRoc ? '▲' : '▼');
    const relColor = asset.name === 'BTC' ? '#fff' : (c.roc30 > btcRoc ? '#00E676' : '#FF1744');
    const structColor = c.above >= 3 ? '#00E676' : c.above >= 2 ? '#FF9100' : '#FF1744';

    return `<div class="cascade-card">
      <div class="c-name">${asset.name}</div>
      <div class="c-rings" style="color:${structColor}">${c.above}/${c.total} MAs</div>
      <div class="c-strength" style="color:${relColor}">${relStr} ${c.roc30.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════

function animate() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Size canvas
  const size = Math.min(window.innerWidth - 32, 700);
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';

  function frame() {
    if (animProgress < 1) animProgress += 0.02;
    if (animProgress > 1) animProgress = 1;
    drawRings(canvas, ctx);
    renderSignal();
    requestAnimationFrame(frame);
  }
  frame();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

async function init() {
  // Loading dots
  const dotsEl = document.getElementById('dots');
  let dots = '';
  const dotInterval = setInterval(() => { dots = dots.length >= 3 ? '' : dots + '.'; dotsEl.textContent = dots; }, 400);

  try {
    await fetchAllBTCData();
    await fetchCascadeData();

    clearInterval(dotInterval);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    renderStats();
    renderCascade();
    animate();
    connectWS();

    // Refresh cascade every 5 minutes
    setInterval(async () => {
      await fetchCascadeData();
      renderCascade();
    }, 300000);

    // Refresh MAs every 2 minutes
    setInterval(async () => {
      await fetchAllBTCData();
      renderStats();
    }, 120000);

  } catch(e) {
    clearInterval(dotInterval);
    document.getElementById('loading').innerHTML = `
      <div class="loading-text" style="color:#FF1744;">ERROR: ${e.message}</div>
      <div style="margin-top:16px;font-size:11px;color:rgba(255,255,255,0.3);">Retrying in 10s...</div>
    `;
    setTimeout(init, 10000);
  }
}

// Handle resize
window.addEventListener('resize', () => {
  const canvas = document.getElementById('canvas');
  if (canvas) {
    const size = Math.min(window.innerWidth - 32, 700);
    canvas.width = size;
    canvas.height = size;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
  }
});

init();
</script>
