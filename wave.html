<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Rings — The Wave</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0f; color:#fff;
  font-family:'SF Mono','Fira Code','Cascadia Code','Courier New',monospace;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:16px;
}
canvas { display:block; border-radius:16px; }
.cards {
  display:flex; gap:14px; margin-top:12px; flex-wrap:wrap; justify-content:center;
}
.card {
  padding:8px 14px; border-radius:8px; text-align:center;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
}
.card .lbl { font-size:8px; letter-spacing:2px; color:rgba(255,255,255,0.4); margin-bottom:3px; }
.card .val { font-size:13px; font-weight:700; }
.loading {
  display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh;
}
.loading-text { font-size:13px; color:rgba(255,255,255,0.35); letter-spacing:3px; }
.ring {
  width:44px; height:44px; border-radius:50%; margin-top:20px;
  border:2px solid rgba(0,230,118,0.3); animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(0.8);opacity:0.3} 50%{transform:scale(1.2);opacity:0.8} }
.hide { display:none!important; }
</style>
</head>
<body>

<div id="load" class="loading">
  <div class="loading-text">TRACING THE WAVE<span id="dots"></span></div>
  <div class="ring"></div>
</div>

<div id="app" class="hide" style="display:flex;flex-direction:column;align-items:center;">
  <canvas id="c"></canvas>
  <div id="cards" class="cards"></div>
</div>

<script>
(function(){
'use strict';

/* ── CONSTANTS ── */
const G = '#00E676', R = '#FF1744', GOLD = '#FFD700', CYAN = '#4FC3F7', BG = '#0a0a0f';
const NOM = 60;

/* ── STATE ── */
const S = {
  wave: [],        // {day, close, high, low} — 4h granularity from trough
  troughTime: 0,
  troughPrice: 0,
  cHi: 0,          // actual cycle high (OHLC)
  cLo: 0,          // actual cycle low  (OHLC)
  cHiDay: 0,       // day within cycle the high was set
  days: 0,         // days into current cycle
  live: 0,         // live price via WebSocket
  declining: false, // conservative phase detection
  ready: false
};

const $ = id => document.getElementById(id);
const canvas = $('c');
const ctx = canvas.getContext('2d');

/* Loading dots */
let dc = 0;
const dt = setInterval(() => { dc = (dc+1)%4; const d=$('dots'); if(d) d.textContent='.'.repeat(dc); }, 400);

function fmt(n) {
  if (!n || isNaN(n)) return '—';
  return '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0});
}

/* ── DATA ── */
async function api(url) {
  const c = new AbortController();
  const t = setTimeout(() => c.abort(), 15000);
  try {
    const r = await fetch(url, {signal:c.signal});
    clearTimeout(t);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  } catch(e) { clearTimeout(t); throw e; }
}

/* ── TROUGH DETECTION (proven algorithm) ── */
function detectTroughs(closes, hw) {
  const t = [];
  for (let i = hw; i < closes.length - hw; i++) {
    let ok = true;
    for (let j = 1; j <= hw; j++) {
      if (closes[i] > closes[i-j] || closes[i] > closes[i+j]) { ok = false; break; }
    }
    if (ok) t.push(i);
  }
  return t;
}

function filterTroughs(raw, closes, minGap) {
  if (!raw.length) return raw;
  const f = [raw[0]];
  for (let i = 1; i < raw.length; i++) {
    if (raw[i] - f[f.length-1] >= minGap) f.push(raw[i]);
    else if (closes[raw[i]] < closes[f[f.length-1]]) f[f.length-1] = raw[i];
  }
  return f;
}

/* ── CONSERVATIVE PHASE DETECTION ──
   The user makes real trading decisions off this.
   We must not flash red on normal pullbacks.

   Rules (tiered — any ONE triggers declining):
   1. Drop ≥ 10% from cycle high  → declining (big move, no debate)
   2. Drop ≥ 6% AND 5+ days past peak → declining (sustained weakness)
   3. Day ≥ 40 AND drop ≥ 5% → declining (late cycle, less room for recovery)

   Everything else stays GREEN (rising).
   A new cycle high resets to rising immediately.
*/
function checkPhase() {
  const p = S.live || (S.wave.length ? S.wave[S.wave.length-1].close : 0);
  if (!p || !S.cHi) return;

  // New high — rising, no question
  if (p >= S.cHi) {
    S.cHi = p;
    S.cHiDay = S.days;
    S.declining = false;
    return;
  }

  const drop = (S.cHi - p) / S.cHi;
  const daysPastPeak = S.days - S.cHiDay;

  S.declining =
    (drop >= 0.10) ||
    (drop >= 0.06 && daysPastPeak >= 5) ||
    (S.days >= 40 && drop >= 0.05);
}

/* ── WEBSOCKET + FALLBACK ── */
let ws = null, wsRetry = 1000, poll = null;

function connectWS() {
  try {
    ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
    ws.onopen = () => { wsRetry = 1000; if (poll) { clearInterval(poll); poll = null; } };
    ws.onmessage = e => {
      try {
        S.live = parseFloat(JSON.parse(e.data).p);
        if (S.live < S.cLo) S.cLo = S.live;
        S.days = (Date.now() - S.troughTime) / 864e5;
        checkPhase();
      } catch(e){}
    };
    ws.onclose = () => { setTimeout(connectWS, wsRetry); wsRetry = Math.min(wsRetry*2, 30000); startPoll(); };
    ws.onerror = () => ws.close();
  } catch(e) { startPoll(); }
}

function startPoll() {
  if (poll) return;
  poll = setInterval(async () => {
    try {
      const d = await api('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
      S.live = parseFloat(d.price);
      if (S.live < S.cLo) S.cLo = S.live;
      S.days = (Date.now() - S.troughTime) / 864e5;
      checkPhase();
    } catch(e){}
  }, 3000);
}

/* ── CANVAS ── */
function resize() {
  const sz = Math.min(window.innerWidth - 32, window.innerHeight - 110, 700);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = sz * dpr;
  canvas.height = sz * dpr;
  canvas.style.width = sz + 'px';
  canvas.style.height = sz + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function dayToAngle(d) {
  return (d / NOM) * Math.PI * 2 - Math.PI / 2;
}

function draw() {
  const w = parseInt(canvas.style.width);
  const h = parseInt(canvas.style.height);
  const cx = w/2, cy = h/2;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,w,h);
  if (!S.ready) { requestAnimationFrame(draw); return; }

  const price = S.live || S.wave[S.wave.length-1]?.close || 0;

  /* ── GEOMETRY ──
     outerR = cycle high
     cycLoR = cycle low (with padding below for break room)
     innerR = absolute inner edge
  */
  const outerR = Math.min(cx,cy) - 44;
  const innerR = outerR * 0.28;
  const band = outerR - innerR;
  const padFrac = 0.15;
  const cycLoR = innerR + band * padFrac;
  const cycBand = outerR - cycLoR;

  function priceToR(p) {
    const t = (p - S.cLo) / (S.cHi - S.cLo || 1);
    return cycLoR + t * cycBand;
  }

  /* ── PHASE-COLORED BACKGROUND ──
     This is the key visual. You see green where the cycle was rising
     and red where it's declining. The transition point IS the peak.
  */
  const troughA = dayToAngle(0);
  const nowA = dayToAngle(Math.min(S.days, NOM));
  const peakA = dayToAngle(S.cHiDay);

  if (S.declining) {
    // Green band: trough → peak
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, troughA, peakA);
    ctx.arc(cx, cy, cycLoR, peakA, troughA, true);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,230,118,0.05)';
    ctx.fill();

    // Red band: peak → now
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, peakA, nowA);
    ctx.arc(cx, cy, cycLoR, nowA, peakA, true);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,23,68,0.05)';
    ctx.fill();

    // Future hint: now → 60 (faint red)
    if (S.days < NOM) {
      const endA = dayToAngle(NOM);
      ctx.beginPath();
      ctx.arc(cx, cy, outerR, nowA, endA);
      ctx.arc(cx, cy, cycLoR, endA, nowA, true);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,23,68,0.02)';
      ctx.fill();
    }
  } else {
    // All green: trough → now
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, troughA, nowA);
    ctx.arc(cx, cy, cycLoR, nowA, troughA, true);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,230,118,0.05)';
    ctx.fill();

    // Future: now → 60 (barely there)
    if (S.days < NOM) {
      const endA = dayToAngle(NOM);
      ctx.beginPath();
      ctx.arc(cx, cy, outerR, nowA, endA);
      ctx.arc(cx, cy, cycLoR, endA, nowA, true);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.012)';
      ctx.fill();
    }
  }

  /* ── BOUNDARY RINGS ── */
  // Outer (cycle high)
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI*2);
  ctx.strokeStyle = S.declining ? 'rgba(255,23,68,0.15)' : 'rgba(0,230,118,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Cycle low
  ctx.beginPath();
  ctx.arc(cx, cy, cycLoR, 0, Math.PI*2);
  ctx.strokeStyle = S.declining ? 'rgba(255,23,68,0.12)' : 'rgba(0,230,118,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Inner edge (break room)
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Midline
  const midR = cycLoR + cycBand * 0.5;
  ctx.beginPath();
  ctx.arc(cx, cy, midR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.035)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4,8]);
  ctx.stroke();
  ctx.setLineDash([]);

  /* ── CLOCK FACE ── */
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let d = 0; d <= NOM; d += 10) {
    const a = dayToAngle(d);
    const major = true;
    const t1 = outerR + 4, t2 = outerR + 14;

    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*t1, cy + Math.sin(a)*t1);
    ctx.lineTo(cx + Math.cos(a)*t2, cy + Math.sin(a)*t2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    const lr = outerR + 26;
    ctx.font = 'bold 9px monospace';
    ctx.fillStyle = d === 0 ? G : 'rgba(255,255,255,0.3)';
    ctx.fillText(d === 0 ? 'T' : ''+d, cx + Math.cos(a)*lr, cy + Math.sin(a)*lr);
  }

  // Minor ticks every 5 days
  for (let d = 5; d < NOM; d += 10) {
    const a = dayToAngle(d);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*(outerR+4), cy + Math.sin(a)*(outerR+4));
    ctx.lineTo(cx + Math.cos(a)*(outerR+9), cy + Math.sin(a)*(outerR+9));
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  /* ── PRICE LABELS on ring edge ── */
  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.textAlign = 'right';
  const la = Math.PI * -0.02;
  ctx.fillText(fmt(S.cHi), cx + Math.cos(la)*(outerR-5)-2, cy + Math.sin(la)*(outerR-5));
  ctx.fillText(fmt(S.cLo), cx + Math.cos(la)*(cycLoR+5)-2, cy + Math.sin(la)*(cycLoR+5));
  ctx.textAlign = 'center';

  /* ── THE WAVE ── */
  const pts = S.wave;
  if (pts.length > 1) {

    // Find where peak day falls in wave points (for ribbon color split)
    let splitI = pts.length;
    if (S.declining) {
      for (let i = 0; i < pts.length; i++) {
        if (pts[i].day >= S.cHiDay) { splitI = i; break; }
      }
    }

    // Ribbon helper: filled area between highs and lows
    function ribbon(from, to, col) {
      if (to <= from) return;
      ctx.beginPath();
      for (let i = from; i < to; i++) {
        const a = dayToAngle(pts[i].day);
        const r = priceToR(pts[i].high);
        if (i === from) ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
        else ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      }
      for (let i = to-1; i >= from; i--) {
        const a = dayToAngle(pts[i].day);
        const r = priceToR(pts[i].low);
        ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fillStyle = col;
      ctx.fill();
    }

    // Phase-colored ribbon
    if (S.declining && splitI < pts.length) {
      ribbon(0, Math.min(splitI+1, pts.length), 'rgba(0,230,118,0.07)');
      ribbon(splitI, pts.length, 'rgba(255,23,68,0.07)');
    } else {
      ribbon(0, pts.length, 'rgba(0,230,118,0.07)');
    }

    // Close price line (always green — the line stays green)
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const a = dayToAngle(pts[i].day);
      const r = priceToR(pts[i].close);
      if (i === 0) ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      else ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }

    // Extend to live
    if (S.live) {
      const la2 = dayToAngle(S.days);
      const lr2 = priceToR(S.live);
      ctx.lineTo(cx+Math.cos(la2)*lr2, cy+Math.sin(la2)*lr2);
    }

    ctx.strokeStyle = G;
    ctx.lineWidth = 2;
    ctx.shadowColor = G;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;

    /* ── LIVE DOT ── */
    const da = dayToAngle(S.days);
    const dr = priceToR(price);
    const dx = cx + Math.cos(da)*dr;
    const dy = cy + Math.sin(da)*dr;

    // Glow rings
    ctx.beginPath(); ctx.arc(dx,dy,10,0,Math.PI*2);
    ctx.fillStyle = 'rgba(0,230,118,0.12)'; ctx.fill();
    ctx.beginPath(); ctx.arc(dx,dy,5,0,Math.PI*2);
    ctx.fillStyle = 'rgba(0,230,118,0.25)'; ctx.fill();

    // Bright dot
    ctx.beginPath(); ctx.arc(dx,dy,3.5,0,Math.PI*2);
    ctx.fillStyle = G;
    ctx.shadowColor = G; ctx.shadowBlur = 14;
    ctx.fill(); ctx.shadowBlur = 0;

    // Price + day label near dot
    const lOff = 20;
    const lx = dx + Math.cos(da)*lOff;
    const ly = dy + Math.sin(da)*lOff;
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = G;
    ctx.textAlign = 'center';
    ctx.fillText(fmt(price), lx, ly - 5);
    ctx.font = '7px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('DAY ' + Math.round(S.days), lx, ly + 6);

    // Needle from inner ring to dot position
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(da)*(cycLoR-6), cy+Math.sin(da)*(cycLoR-6));
    ctx.lineTo(cx+Math.cos(da)*cycLoR, cy+Math.sin(da)*cycLoR);
    ctx.strokeStyle = G; ctx.globalAlpha = 0.25; ctx.lineWidth = 1.5;
    ctx.stroke(); ctx.globalAlpha = 1;
  }

  /* ── FUTURE ARC ── */
  if (S.days < NOM) {
    ctx.beginPath();
    ctx.arc(cx, cy, midR, dayToAngle(S.days), dayToAngle(NOM));
    ctx.strokeStyle = S.declining ? 'rgba(255,23,68,0.06)' : 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,7]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  /* ── CENTER HUD (minimal) ── */
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Phase word — the single most important signal
  const phase = S.declining ? 'DECLINING' : 'RISING';
  const phaseCol = S.declining ? R : G;
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = phaseCol;
  ctx.fillText(phase, cx, cy - 18);

  // Position in range
  const pct = S.cHi !== S.cLo ? Math.round(((price - S.cLo) / (S.cHi - S.cLo)) * 100) : 50;
  ctx.font = 'bold 32px monospace';
  ctx.fillStyle = pct > 80 ? GOLD : pct < 20 ? CYAN : G;
  ctx.fillText(pct + '%', cx, cy + 10);

  ctx.font = '7px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillText('OF CYCLE RANGE', cx, cy + 30);

  // Trough marker at 12 o'clock
  ctx.font = '7px monospace';
  ctx.fillStyle = 'rgba(0,230,118,0.35)';
  ctx.fillText('TROUGH', cx, cy - cycLoR + 12);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillText(fmt(S.troughPrice), cx, cy - cycLoR + 22);

  requestAnimationFrame(draw);
}

/* ── INFO CARDS ── */
function updateCards() {
  const p = S.live || 0;
  const range = S.cHi - S.cLo;
  const phaseCol = S.declining ? R : G;
  const phaseLabel = S.declining ? 'DECLINE' : 'RISING';

  $('cards').innerHTML = `
    <div class="card">
      <div class="lbl">CYCLE DAY</div>
      <div class="val" style="color:${G}">${Math.round(S.days)} <span style="font-size:9px;color:rgba(255,255,255,0.25)">/ ${NOM}</span></div>
    </div>
    <div class="card">
      <div class="lbl">RANGE</div>
      <div class="val" style="color:rgba(255,255,255,0.6);font-size:11px">${fmt(S.cLo)} — ${fmt(S.cHi)}</div>
    </div>
    <div class="card">
      <div class="lbl">WIDTH</div>
      <div class="val" style="color:${G}">${fmt(range)}</div>
    </div>
    <div class="card">
      <div class="lbl">PHASE</div>
      <div class="val" style="color:${phaseCol}">${phaseLabel}</div>
    </div>
  `;
}

/* ── INIT ── */
async function init() {
  try {
    // Daily OHLC for trough detection
    const daily = await api('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=200');
    const kd = daily.map(k => ({ t:+k[0], h:+k[2], l:+k[3], c:+k[4] }));
    const closes = kd.map(k => k.c);

    // Detect troughs
    let troughs = detectTroughs(closes, 12);
    troughs = filterTroughs(troughs, closes, 30);
    if (troughs.length < 1) {
      troughs = detectTroughs(closes, 8);
      troughs = filterTroughs(troughs, closes, 36);
    }

    const ti = troughs.length ? troughs[troughs.length-1] : 0;
    S.troughTime = kd[ti].t;
    S.troughPrice = closes[ti];

    // 4h klines from trough to now
    const h4 = await api(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=4h&startTime=${S.troughTime}&limit=1000`);
    const msDay = 864e5;

    S.wave = h4.map(k => ({
      day: (+k[0] - S.troughTime) / msDay,
      close: +k[4],
      high: +k[2],
      low: +k[3]
    }));

    // Cycle range from OHLC highs and lows (not just closes)
    const highs = kd.slice(ti).map(k => k.h);
    const lows  = kd.slice(ti).map(k => k.l);
    S.cHi = Math.max(...highs);
    S.cLo = Math.min(...lows);

    // Peak day
    const peakIdx = highs.indexOf(S.cHi);
    S.cHiDay = peakIdx;
    S.days = (Date.now() - S.troughTime) / msDay;

    // Set live price
    S.live = closes[closes.length-1];

    // Initial phase check
    checkPhase();

    S.ready = true;
    clearInterval(dt);
    $('load').classList.add('hide');
    const app = $('app');
    app.classList.remove('hide');
    app.style.display = 'flex';

    resize();
    draw();
    updateCards();
    setInterval(updateCards, 2000);
    connectWS();
    window.addEventListener('resize', resize);

  } catch(e) {
    console.error(e);
    $('dots').textContent = '';
    document.querySelector('.loading-text').textContent = 'ERROR: ' + e.message;
  }
}

init();
})();
</script>
</body>
</html>
